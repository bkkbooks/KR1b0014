body:
  text: 尚書説卷四宋黃度撰周書惟十有一年武王伐殷一月戊午師渡孟津作泰誓三篇周自后稷封邰至子不窋失職奔于戎狄之間又二世至公劉修后稷之業國於齒今邠州三水縣又九世至亶父避狄遷岐國號周今鳯翔岐山縣是為大王子歷是為王季子昌是為文王都豐今永興長安縣西北靈臺鄉豐水上遊是也子發是為武王都鎬今昆明池北鎬陂是也序為十一年書為十三年史記作十一年與序同案書序伊訓泰誓書年皆有義伊訓防疑泰誓闕疑書十三年當是傳寫至夫子時已誤夫子以周史考實為一年承書之誤不改而自於序正之蓋闕疑之類也一月夏正月周為三月稱一月存夏正也一月戊午蒙上十一年十一年一月也孔氏以為十三年正月欲就書十三年而於文斷絶不屬須説乃通非是自漢書皆以武王伐紂成文王之志故不改先君數年通九年大統未集服喪三年還師二年為十三年亦非武王繼志述事何待於不改數年而告終易代史不紀實自古無此是當為武王即位之十一年一月建寅之月孔氏曰周孟春孟春建寅豈隨王而改邪史記作十二月蓋以為未改商正也亦非商書猶自稱十二月未嘗稱一月也戊午以武成推次為孟春正月二十八日泰誓上惟十有三年春大會于孟津稱春則序一月為建寅之月矣此與春秋不同春秋書王書正月則為時王正月加春於其上以為正雖改而四時之序不可改此獨書春則當自建寅之月始詩書書月皆不改夏正會孟津未濟誓衆諸侯大會故名泰誓王曰嗟我友邦冡君越我御事庶士明聽誓王者於諸侯為友詩亦曰邦人諸友冡大諸侯各長其國故稱大君御事治事自其卿大夫下至庶士惟天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母人與萬物俱生而人為靈聰明出類為君父母斯民亶誠元首天子稱元后今商王受弗敬上天降災下民沉湎冒色敢行暴虐罪人以族官人以世惟宫室臺榭陂池侈服以殘害于爾萬姓弗克敬天紂植惡之本天猶弗敬視民何有天為民立君而殘害萬姓如此豈所以為民父母哉沉湎嗜酒冒亂女色心志內蠱聰明日喪遂至於敢行暴虐無所畏忌天討有罪而濫其族天敘有德而私其世天覆燾生育而朘削之以崇飭非度皆為弗克敬天也崇土曰臺有木曰榭澤障曰陂停水曰池焚炙忠良刳剔孕婦紂滅天理至此極矣放殺仁人君子之所不忍言也而又歷數其罪如此涼薄殆甚歟非也惡必若桀紂德必若湯武而後可行放殺之事歷數其賊仁害義為獨夫之實使天下後世共知之而亂臣賊子不敢以藉口而誣其君然君子猶曰紂之為惡不如是之甚夫會者數十萬一語不實其敢出諸口哉皇天震怒命我文考肅將天威大勳未集史記紂作炮烙之刑以西伯昌九侯鄂侯為三公醢九侯脯鄂侯囚西伯羑里西伯出羑里獻洛西之地請除炮烙之刑紂許之賜弓矢斧鉞使得征伐經自焚災忠良刳剔孕婦以上其事皆在文王専征伐之前文王既賜弓矢斧鉞於是伐密伐崇大勳未集而文王終紂使文王為西伯専征伐是則紂猶可輔也肆豫小子發以爾友邦冡君觀政于商惟受罔有悛心乃夷居弗事上帝神祇遺厥先宗廟弗祀犧牲粢盛既于凶盜乃曰吾有民有命罔懲其侮豈惟無悛心而反甚焉孰能懲其侮哉殷民攘竊犧牲牷用乃能責命于天皆乘黎之後觀祖伊箕子之言則乘黎為觀政斷然矣雖商之賢人君子皆以紂為當亡而猶須暇之五年則乘黎為武王六年又五年會孟津為十一年先儒服喪三年還師二年皆牽合十一年十三年與須暇五年又史記文王伐耆祖伊乃告紂皆非泰誓文王武王事皆有次序詩文王無伐飢所謂衆言殽亂折諸聖當一以經為證天佑下民作之君作之師惟其克相上帝寵綏四方有罪無罪豫曷敢有越厥志武王以君師自任而不能出斯民於塗炭使日遷善遠罪則為越厥志矣同力度德同德度義受有臣億萬惟億萬心豫有臣三千惟一心雖有其德必觀其義武王之行天討惟其義也故易常以時兼義而言臣億萬億萬心德義不足以協之雖三人亦各行其志耳臣三千惟一心德尊義正安得而二三哉雖然伯夷叔齊猶曰以為求仁而得仁夫是以知道之難盡商罪貫盈天命誅之豫弗順天厥罪惟鈞貫如繩貫物之貫紂之不善非一事而同歸于亂如繩之貫物聖人之察天密矣天命在武王不能順天而討之存其罪與為惡者鈞是故此義為嚴豫小子夙夜祇懼受命文考類于上帝宜于冡土以爾有衆底天之罰詩文王受命作周書武王受命文考一意周官太祝太師造于廟宜于社類上帝伐商王事也故師祭皆以王者之禮建諸天地而不悖質諸鬼神而無疑也天矜于民民之所欲天必從之爾尚弼豫一人永清四海時哉弗可失觀民情嚮背可以占天意矣天且亡殷然而弼豫一人非心力之一莫能濟也聖人所以盡人事者又如此一失此時四海又至何時而能清邪泰誓中惟戊午王次于河朔羣后以師畢會王乃徇師而誓既濟次于河北待諸侯濟諸侯畢至王乃拊循其師而誓之曰嗚呼西土有衆咸聽朕言西方諸侯武王以西伯行師正大義東方諸侯篚厥玄黃昭我周王蓋皆附于周矣我聞吉人為善惟日不足凶人為不善亦惟日不足人性本相近吉凶之習愈熟而愈逺今商王受力行無度播棄犂老昵比罪人淫酗肆虐臣下化之朋家作仇脅權相滅無辜籲天穢德彰聞力行無度惟日不足也正義老人面凍梨色則犁當作梨朋家家各為朋脅權以權力相迫脅此所謂卿士師師非度小民方興相為敵讎者也惟天惠民惟辟奉天有夏桀弗克若天流毒下國天乃佑命成湯降黜夏命下國諸侯之國幽王將亡何草不黃漸漸之石皆下國刺詩其毒遍天下矣惟受罪浮于桀剝喪元良賊虐諫輔謂已有天命謂敬不足行謂祭無益謂暴無傷厥監惟不逺在彼夏王浮過也剝落也元良皆善也剝落喪亡不使復有存者易剝上九碩果不食剝至此極矣譬之於果幸有存此大者庶幾其食則事尚可為也剝喪無餘國豈能復立哉此皆觀政後事觀刳胎剖心紂罪誠過於桀殺一婦人非其法已為逆害況諫輔乎此必當誅天其以豫乂民朕夢協朕卜襲于休祥戎商必克武王為有天命矣記曰國家將興必有禎祥將亡必有妖孽見乎蓍龜動乎四體故至誠如神夢卜之協其禎祥之先見乎受有億兆夷人離心離德豫有亂臣十人同心同德雖有周親不如仁人夷平既皆平凡之人而又離心離德雖衆何救於亡治亂曰亂夫子曰有婦人焉閎散顚括望旦奭餘二人失其傳或曰髙佚周至也箕子膠鬲之屬皆不能救仁人言其志在生民天視自我民視天聽自我民聽百姓有過在豫一人以人占天湯曰爾萬方有罪在豫一人而武王亦云救之於水火之中不足言也必能使之興仁興讓人有士君子之行則為君師之職今朕必往我武惟揚侵于之疆取彼凶殘我伐用張于湯有光天命如是安得不往湯誓師於國中已作此語武王濟河入商地益深始自以為必往則前此為未必猶俟其改歟揚武侵疆取凶殘伐功乃張大湯伐桀武王繼其事章明天命人心取豫為無私故於湯為有光朂哉夫子罔或無畏寧執非敵百姓懍懍若崩厥角朂勉臨事而懼好謀而成夫子以為行三軍之道寧執不敢敵之意紂之威百姓懍懍若崩摧其角如其以無道驅之人猶為之赴敵其可忽之乎嗚呼乃一德一心立定厥功惟克永世泰誓下時厥明王乃大巡六師明誓衆士時是厥明戊午明日諸侯之師濟河猶各為營壁今始分𨽻六師王乃遍巡行陳而誓之王曰嗚呼我西土君子天有顯道厥類惟彰作善降之百祥不善降之百殃惟其類也今商王受狎侮五常荒怠弗敬自絶于天結怨于民五常仁義禮智信不知德義之可尊而狎侮之夫是以荒怠弗復居敬不循天理日濟其惡故自絶于天穢德彰聞流毒天下故結怨于民斫朝涉之脛剖賢人之心作威殺戮毒痡四海崇信姦回放黜師保屏棄典刑囚奴正士紂多怒而喜殺黨邪而疾正習與性成迷而不反郊社不修宗廟不享作竒技淫巧以悅婦人淫褻是圖而至尊之敬猶不恤誰能與易之禹曰無若丹朱傲惟慢遊是好傲虐是作罔晝夜額額罔水行舟朋淫于家用殄厥世紂罪亦不出傲慢淫虐朱之惡未及民堯知其為不肖而禪舜朱遂以殄厥世桀紂毒民已甚湯武正其罪而放殺之湯武遂有天下而夏商之世亦絶皆天道也上帝弗順祝降時喪爾其孜孜奉豫一人恭行天罰祝斷古人有言曰撫我則后虐我則讎獨夫受洪惟作威乃汝世讎衆非元后何戴撫我則后也后非衆罔與守邦虐我則讎也舜禹湯武之言同天下畔之是為獨夫紂大惟作威以酷害其民凡其民之子孫皆得讎之故謂之世讎伍員復讎義出此王師將臨其國都於是正君臣名義稱之曰獨夫見其為當誅也孟子曰聞誅一夫紂矣未聞弒君也父子有親君臣有義親一隆而不變義有合有離樹德務滋除惡務本肆豫小子誕以爾衆士殄殱乃讎取彼凶殘殄殱乃讎皆見其罪為不可赦爾衆士其尚迪果毅以登乃辟功多有厚賞不迪有顯戮迪蹈殺敵為果致果為毅登成辟君武王於是而有天下三誓而後及賞罰行陳既立始以軍法臨之嗚呼惟我文考若日月之照臨光于四方顯于西土惟我有周誕受多方豫克受非豫武惟朕文考無罪受克豫非朕文考有罪惟豫小子無良此論父子繼述之義蓋不獨文武之事為然故中庸以武王對舜舜為大孝謂其能諧瞽也武王為逹孝謂其能繼文也而又有父為大夫子為士父為士子為大夫之論天下萬世之公言也周誕受多方皆文王明德致之若武王不能克紂事勢一變議論轉移或且上纍文王故誓師終篇反復於文王無罪有罪然則其事誠重矣湯武之事後世或疑於君臣之際而不知父子之間更有所難也孟子曰聖人人倫之至也非聖人奚能盡其道哉武王戎車三百兩虎賁三百人與受戰于牧野作牧誓戎車五戎戎廣闕屏輕車稱兩正副合周官虎賁氏虎士八百人掌先後王而趨以卒伍孟子武王虎賁三千人史記同序之傳恐誤武王曰豫有臣三千中堅當馳道者也牧野在衛州汲縣啇近郊牧誓時甲子昧爽王朝至于商郊牧野乃誓甲子二月四日昧冥爽明早旦古者國郊置關師旅不入乃誓言遂戰矣王左杖黃鉞右秉白旄以麾曰逖矣西土之人伊耆氏軍旅授有爵者杖王以黃金飭斧為杖白旄以號令逖逺言其至此逺矣上下同勞苦之且勵之也王曰嗟我友邦冢君御事司徒司馬司空亞旅師氏千夫長百夫長及庸蜀羌髳微盧彭濮人自諸侯至庸蜀諸蠻皆軍師長歷數而誓之軍法責帥也御治三卿治國事也泰誓六師此惟三卿者周本三軍諸侯以師會于孟津至河朔始以王者之制合為六師其三師蓋攝歟亞次旅衆次於卿之衆大夫二千五百人之師帥也師氏王舉則從使其屬帥四夷之隸各以其兵服守王之門外是為王衛者五百人為旅旅有帥本一黨五百人之長州黨族閭比皆有聨千夫長蓋聨二黨而置一長百夫長卒長也庸蜀羌髳微盧彭濮蠻夷屬周者庸今房州竹山縣古庸國蜀今利州春秋戰國時為蜀侯國羌本薑姓三苖之後居三危春秋允姓瓜州之戎入居中國秦漢間氐羌錯居西方今疊岩松諸州皆羌地周初未必然也濮多種左氏稱百濮嘗與麋庸叛楚糜在今荆門軍當陽縣濮當在今江陵界此庸蜀羌濮之見於書傳可考者髳微盧彭則難考矣或曰唐姚州有微水蠻戎州羈縻有微髳二州今瀘州古巴子國又今雅州有盧山縣彭今眉州彭山縣有彭祖冢及祠凡此名稱雖同未必是惟瀘以瀘水得名春秋巴嘗與秦楚滅庸亦大國或恐本盧改巴不可必也稱爾戈比爾干立爾矛豫其誓警肅之使聽誓稱舉戈戟比合干盾王曰古人有言曰牝雞無晨牝雞之晨惟家之索今商王受惟婦言是用紂之酗虐盡出妲己遂至於亡通國之人怨怒之故牧野誓師指以為罪首順人心也史記武王斬紂太公斬妲己昏棄厥肆祀弗答昏棄厥遺王父母弟不迪乃惟四方之多罪逋逃是崇是長是信是使是以為大夫卿士俾暴虐于百姓以姦宄于商邑紂淫酗而昏棄其祭祀弗躬弗親雖陳設而鬼神弗答棄其宗室遺老王父之母弟不以恩禮接之使不能蹈其常王父母弟屬尊且親似指箕子而惟多罪逋逃崇長任使為大夫卿士使為暴虐姦宄此皆箕子微子之所以或去或囚而比干之所以死也豈有一語詆誣之哉牧野誓師語簡而旨嚴妲己當誅逋逃害義暴民甚者惡來飛廉之屬當誅故特見之記曰仁者人也親親為大義者宜也尊賢為大起罪紂於淫昏始不敬終不仁不義多罪逋逃為大夫卿士立政所謂無義民桀德弗作往任是惟暴德者也今豫發惟恭行天之罰今日之事不愆于六步七步乃止齊焉夫子朂哉不愆于四伐五伐六伐七伐乃止齊焉愆過伐擊刺進不過七步殺敵不過七伐必止而齊一之嚴重堅整務為不可勝擊刺自四積至七見其為不得已也朂哉夫子尚桓桓如虎如貔如熊如羆于商郊桓桓威也弗迓克奔以役西土能舍紂來奔弗迎殺之使聽役于我西土朂哉夫子爾所弗朂其于爾躬有戮夏商師誓皆有孥戮之罪蓋古法也此無之文王罪人不孥遂為周家法武王伐殷往伐歸獸識其政事作武成往伐而反歸馬放牛示天下弗服此出師大節其間政事首尾皆識之尚書右史記言此兼識政事書名武成武事成也武成惟一月壬辰旁死魄越翼日癸巳王朝步自周于征伐商厥四月哉生明王來自商至于豐漢律厯志死魄朔也生魄望也旁近也近死魄月二日也哉始也始生明月三日也古史官紀事必書朔望死魄生明占步最凖翼明也武王以一月三日行自周往征伐商至四月三日還歸在豐凡九十日役不踰時凡稱周皆鎬也武成首記伐商往返日月序所謂往伐也乃偃武修文歸馬于華山之陽放牛于桃林之野示天下弗服天下固猶有未服者乃偃武修文歸馬放牛以示之此與舜舞干羽意同歸馬放牛就牧也華山桃林皆在華隂縣華州禹貢屬雍兼有豫地周職方豫州其鎮曰華山是也周為畿內之地鄭桓公友封邑一名咸林春秋為秦晉地華山記云山分秦晉之境鄙晉之西則曰隂晉邊秦之東則曰寧秦桃林即潼關左傳晉使詹嘉守桃林之塞歸馬於華山之南放牛於其北史記載武王之言曰粵瞻洛伊毋逺天室營周居於洛邑縱馬放牛偃干戈振兵釋旅示天下弗復用然則作洛武王意也故序特表歸獸對往伐秦敖倉在滎陽漢武庫在洛陽實連雍洛據天下全勢皆為識此意者丁未祀于周廟邦甸侯衛駿奔走執豆籩越三日庚戌柴望大告武成自此以下皆識政事祀廟始用天子禮樂稱周廟新視聽也六服侯甸男采衛要舉侯甸衛詳近而録逺也要則略矣駿疾奔走執豆籩助祭燔柴祭天望祭山川祀廟齋三日乃祭天先廟後天將祭天配禝故祭廟尊祖而後配焉其序當如此既生魄庶邦冢君暨百工受命于周魄生明死既生魄望後一日王若曰嗚呼羣后自先王建邦啓土以下至一戎衣天下大定専言周之所以興於是后稷大王王季文王皆稱王商契稱玄王蓋追王也周既王稷又自大王而下於是以王言告諸侯非天子不制禮不作樂也歎見孝思必告羣后天下之公議也議定明日乃祀廟惟先王建邦啓土公劉克篤前烈至于大王肇基王迹王季其勤王家我文考文王克成厥勳誕膺天命以撫方夏大邦畏其力小邦懷其德惟九年大統未集先王后稷建邦啓土於邰為周始祖公劉修后稷之業篤厚也詩稱為公劉大王避狄從之者如歸市王迹基於此王季在商武乙太丁帝乙之世有攘戎之功商王錫圭瓉文王為西伯克成纍世之勳紂賜弓矢斧鉞得專征伐王事也故為受命之始大雅文王為受命作周之詩大明為武王復受天命之詩綿為文王之興本由大王之詩此追王本指大邦畏其力不敢暴小邦懷其德有所恃詩云爰整其旅以遏徂莒自専征九年而大統未集武王承志伐商而天下歸之昔湯有天下而尊契是為建國始祖則周尊后稷無可疑者推原王業所自來追王斷自大王以下公劉非無功德而非王迹所由興故亦同之於羣公此皆為天下公議武王周公之所以為達孝者也文王九年大統未集先儒皆指為稱王之實紂在而稱王斷無此事若文王已稱王何以為追王九年自専征伐之後九年豫小子其承厥志底商之罪告于皇天后土所過名山大川曰惟有道曾孫周王發將有大正于商今商王受無道暴殄天物害虐蒸民為天下逋逃主萃淵藪豫小子既獲仁人敢祗承上帝以遏亂略華夏蠻貊罔不率俾恭天成命肄豫東征綏厥士女惟其士女篚厥玄黃昭我周王天休震動用附我大邑周惟爾有神尚克相豫以濟兆民無作神羞告于皇天后土即出師類帝宜社也過大山川用事祈福此其祝辭也武王自謂有道指紂為無道也曲禮內事曰孝子某侯某外事曰曾孫某侯某外紀天生萬物紂暴絶之民罔非天胤紂害虐之為天下逋逃主如魚鳥萃于淵藪仁人十亂聖智人仁賢義理之會應天順人四海歸之綏安玄黃幣昭明我周王之行大罰此豈人力哉天休震動用是皆附周大邑猶京師衆大之稱也篚厥玄黃昭我周王非類帝時語蓋入商境乃有此事隨所過山川祝辭始著此語至是類聚詔告諸侯以見伐商為恭天成命告於天地鬼神而無愧也既戊午師逾孟津癸亥陳于商郊俟天休命甲子昧爽受率其旅若林會于牧野罔有敵于我師前徒倒戈攻于後以北血流漂杵一戎衣天下大定大明曰會朝清明伶州鳩曰王以癸亥夜陳末畢而雨故孔氏曰待天休命謂夜雨止畢陳要之戰勝不勝雖人事必有天意焉紂師前徒倒戈攻于後以北則為佑周之休命也商亡周興在此一戰聖人豈敢自謂人力能致此哉史記牧野諸侯兵會者車四千乘紂亦發兵七十萬人距武王諸侯皆畔矣是殆郊兵歟卒乃前攻其後以北是則無一人不畔豈非獨夫歟孟子於武成取二三策蓋謂以至仁伐不仁何至殺人血流漂柞孟子以仁義説齊梁之君抑揚其辭如此七十萬之衆前攻其後奔逐崩潰安得無蹂踐殺傷故史不沒其實以見征伐之不如禪讓聖人之所深愧也一服戎衣而滅紂天下遂定乃反商政政由舊反紂暴虐荒亂之政盡用湯太甲祖乙盤庚髙宗舊政釋箕子囚封比干墓式商容閭囚奴徒𨽻商容紂所廢賢者閭里門散鹿臺之財發巨橋之粟大賚于四海而萬姓恱服散財發粟以代天下之貢賦鹿臺在朝歌城中新序曰大三里髙千尺巨橋在洺州曲周縣紂之亡豈為無貯積邪賢者民望財粟民命故反商政以禮賢為首而賑發次之列爵惟五分土惟三建官惟賢位事惟能爵公侯伯子男土公侯百里伯七十里子男五十里紂昵比罪人崇長逋逃列爵分土建官位事豈復遵用典章哉於此悉反之於先王之舊重民五教惟食喪祭五教五典食養生喪送死祭追逺皆人紀也惇信明義崇德報功上好信則民莫敢不用情上好義則民莫敢不服封神農之後於焦黃帝之後於祝帝堯之後於薊帝舜之後於陳大禹之後於杞崇德也封功臣師尚父為首封封尚父於營丘曰齊封弟周公旦於曲阜曰魯封召公奭於燕封弟叔鮮於管弟叔度於蔡餘各以次受封報功也垂拱而天下治夫是以謂之武成周人八百年規模盡在此武王勝殷殺受立武庚以箕子歸作洪範武庚紂子名祿父立為殷後湯既勝夏遂黜夏命封夏之後武王勝殷即殷國立紂子武庚不改其國事稍與湯異至武庚叛周始黜殷命封微子於宋悉如夏事序稱武王勝殷殺受立武庚則箕子無所歸矣歸周非箕子意故又用春秋例稱以歸箕子本欲為紂臣僕紂誅不得行其志武王尊禮之強以歸周行武王之義也箕子終不臣周受地於朝鮮而君之行箕子之義也箕子傳洛書武王有天命故箕子以其學傳武王而作洪範道之大公非一人之私也九疇之錫彛倫之敘箕子不敢廢斯道也洛書於是始有章句洪範惟十有三祀王訪于箕子不稱年而稱杞箕子之志也不改丑正嵗年序事自用商家舊制武王不敢違其志也箕子居周已二年熟觀武王以為可以傳道而後武王敢問焉史記克商後二年問箕子天道十一年克商後二年為十三年史記又曰問箕子殷所以亡箕子不忍言贅王乃言曰嗚呼箕子惟天隂騭下民相協厥居我不知其彛倫攸敘乃有繼之辭非倉卒而問也隂默騭定相助天地之性人為貴天默定之也相助之使協其居人君之職也仁人之安宅義人之正路曠安宅而弗居舍正路而弗由難矣彛常倫類武王自謂不知其所由敘將無以協民之居逸居而無教則近於禽獸豈天惠民之意哉箕子乃言曰我聞在昔鯀堙洪水汨陳其五行帝乃震怒不畀洪範九疇彛倫攸斁堙塞汨亂鯀謂土能勝水故塞之水失其性而火木金土之用俱廢故謂之汨陳畀豫洪範大法疇類斁壞鯀塞洪水逆天害理帝乃震怒不畀洪範九疇彛倫由是而壞九疇始五行五行汨則無以敘彛倫然則洪範本五行由五事而下皆其流衍也鯀治水而懷襄愈甚此為震怒之實鯀則殛死禹乃嗣興天乃錫禹洪範九疇彞倫攸敘禹疏九河陂九澤皆行其所無事萬物各得其性而彞倫敘鯀殛死禹嗣鯀國改封夏故禹有天下祀鯀配天廢興之際皆有天命焉古説神龜負書或疑其迂怪難信非也伏羲畫八卦伏羲之前非無易也禹敘九疇禹之前非無書也本有此理聖人發其妙耳龜馬則其開先也易繫曰河出圖洛出書聖人則之又曰伏羲氏仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之德以類萬物之情是則不獨觀法於圖也漢儒謂六十五字列於龜背為洛書本文則誠誤矣初一曰五行次二曰敬用五事次三曰農用八政次四曰協用五紀次五曰建用皇極次六曰乂用三德次七曰明用稽疑次八曰念用庶徴次九曰嚮用五福威用六極天數五地數五五位相得而各有合本乎天者皆陽也本乎地者皆隂也獨陽不生獨隂不成乾父坤母隂陽交感萬物化生是故洛書始五行五行式序而不亂自五事至福極各致其用焉人稟五行之秀視聽言貌思即聖賢事業而主敬敬盡心知性之學也八政自農始農飲食也而無政雖有粟吾得而食諸協合也堯厯象日月星辰敬授人時必合而後析因夷隩無所差忒焉皇極其次曰居中布數所以統類九疇也是故皇極建則九疇敘堯舜禹湯文武之所以傳此道也乂治也剛柔勢敵而爭德合而平必各自勝其偏同歸於正直則治安之道也雖然剛柔固有不易之正體也一紊其體陵僣生焉治何由立稽考也天下未嘗無可疑之事也稽疑所以通鬼神之情也人謀鬼謀此理不易惟明則不惑庶徴和同天人之際也小心翼翼昭事上帝聖人豈嘗一念不在是哉操運動之機觀災祥之變念念相續以身為驗其佑神者之所為乎福極歸之於天也福為可嚮極為可畏是為天命之不可易者歸之於天聖人所以罕言命也此九疇之敘也一五行一曰水二曰火三曰木四曰金五曰土水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡潤下作鹹炎上作苦曲直作酸從革作辛稼穯作甘五氣順布四時行焉水一火二木三金四土五其生數也潤下炎上曲直從革稼穡五行之一其性者也水位於北以從盛隂故潤下火位於南以從盛陽故炎上木位於東金位於西皆隂陽半故木有曲有直而金從革水生木故柔而能剛火勝金故剛而能柔稼穡土功之著者也曰盡辭也爰於也土無不生稼穡不可以盡土之性故不以盡辭焉其曰於者謂於此而施稼穡之功也致用曰作茀厥豐草種之黃茂草亦生於土妨穀則茀除之五行致用有人力焉有色有聲有臭有味獨出味味物成致養也物之生也皆有五行之性隨其稟之偏者而勝焉是故合變化分剛柔而萬物之情可見矣二五事一曰貌二曰言三曰視四曰聽五曰思貌曰恭言曰從視曰明聽曰聰思曰睿恭作肅從作乂明作哲聰作謀睿作聖貌無不恭言無不從視無不明聽無不聰思無不睿本有之性也不恭貌之惰不從言之忒不明視之蔽不聰聽之惑不睿思之塞逐物而失之者也孟子之道性善原其本然者耳故曰若夫為不善非材之罪也是故五事以敬致用敬無作止無將迎無取舍無回互無倚阿體其自然而復其初故曰敬盡心知性之學也能盡其性則能致其用矣望之儼然恭作肅也言而民莫不從從作乂也旁燭無疆明作哲也百姓效能聰作謀也大而化之睿作聖也惟聖人為能踐形衆人則纍於形者也君子非禮勿視非禮勿聽非禮勿言非禮勿動學為聖人而已矣五事之次與孟子四端同人之道仁義而已禽獸有形而無貌有聲而不能言本無是也稟其偏者也三八政一曰食二曰貨三曰祀四曰司空五曰司徒六曰司寇七曰賔八曰師食以養生貨以懋遷祀以崇本工以利用教以正德刑以詰姦賔以交際師以禦惠八者政之所自行也養生喪死無憾王道之始也故食貨居先王氏曰釋之寥寥蒸之浮浮后稷肇祀庶無罪悔后稷樹藝五榖遂以肇祀以祀教敬則民不茍也故祀次之器利用足故司空次之食足用利而教興焉故司徒次之刑以弼教故司寇次之所以相交際者不可廢故賔次之所以相保聚者不可廢故師又次之賔者非獨施於來諸侯通四夷而已也鄉使相賔師者非獨於征不庭伐不順而已也殺越人於貨愍不畏死不待教而誅之食貨祀賔師稱其事通乎下也司空司徒司寇稱其官制乎上也正法度敷教制刑必自其上出四五紀一曰歲二曰月三曰日四曰星辰五曰厯數嵗星十二嵗一周天所以紀嵗月一日行天十三度而贏二十九日過半而已周天與日會所以紀月自夜半至明日夜半日一出沒行天一度所以紀日星二十八宿辰其次也日百刻二十八宿晝夜迭見而天行周十二次故曰十二辰亦曰十二時所以紀星辰積辰而為日積日而為月積月而為嵗推厯命數以彰往知來六位時成變化之道備矣故嵗月日時皆協於此而萬齊焉夫是為天道堯舜禹之授受皆曰厯數在躬紂弗克若天天命已改授而猶曰我生不有命在天是猶足與言天道哉易之革為治厯明時之象而其彖曰湯武革命應乎天而順乎人五皇極皇大極中不曰大而曰皇何也皇君德也皇極稱皇稱王為其有是大德也不曰中而曰極何也極之為言至也盡也中則至矣盡矣是故衆理趨焉故先儒譬之屋極言衆木之所輳也譬之星極言衆象之所拱也是故皇以君稱極以理稱盛德之形容也其實即大中也一九二八三七四六皆自為對而五無對無對故體大一九二八三七四六分據八方而五居中居中故理合夫率天下於仁義中正小則無以受之易火在天上大明廣照為大有之象君子以遏惡揚善順天休命皇極遏惡揚善也五福天之休命也六極其威命也錫福而成極所以順天休命也天豈欲人之為惡哉舜之善與人同伊尹之以斯道覺斯民有是大者也匹夫匹婦有不與被堯舜之澤則不足以為是大矣皇建其有極斂時五福用敷錫厥庶民惟時厥庶民于汝極錫汝保極何以為有極有生於無無不可名象及其有則天地萬物之理無不彰焉必能大建此有極使斯民嚮福而畏極而後人之道立矣五福民本有之也皇建其有極而民作德是故安仁而夀明義而富恬養而康寧秉彞而好德明哲保身而考終命是為斂而敷錫之其實則皆有其本也一協於極而五福皆備故謂之斂保之言守也民莫不汝極矣而仁不能守之則有時而遁必又以汝之保極者錫之孟子曰王者之民皥皥如也殺之而不怨利之而不庸民日遷善逺罪而不知夫如是而後可以保汝汝武王也使武王任其事也凡厥庶民無有淫朋人無有比德惟皇作極凡厥庶民有猷有為有守汝則念之不協于極不罹于咎皇則受之而康而色曰豫攸好德汝則錫之福時人斯其惟皇之極詩曰宜民宜人民萬民人有位君子也庶民無有淫邪之朋有位士君子無有比周之德則惟上之人大作中而後有此人之為惡有朋有比則根據盤固煽焰淪胥治之為難茍無容德忿疾求備皆非惟皇作極也觀殷頑民非武王周公大德豈能善治之哉武王為有所受矣猷道有猷賢也有為能也有守有節行也有猷有為有守協于極者也汝固當念之禹曰惟帝念功其有不協于極而亦不罹于可絶之惡則大受之孔子思中行而不可得則又思其次者狂狷之士不可以入聖人之道則狹矣而汝也康安也汝安汝顔色而語之曰豫所好者德也使其心恱意慕是為汝錫之福而是人斯亦其惟大中之趨色之康心之平也忿疾一作則大聲以色拒人於千里之外矣有猷有為有守則念之不協于極不罹于咎則受而教之兼容平施是與天地同量足為皇建有極矣無虐煢獨而畏髙明人之有能有為使羞其行而邦其昌凡厥正人既富方榖汝弗能使有好于而家時人斯其辜于其無好德汝雖錫之福其作汝用咎煢獨無告常心為易失也先王發施必先之者不敢虐之也髙明有祿位者也茍弗能使修其行與有好于而家而爵祿之是為畏之也無虐煢獨而畏髙明一視同仁欲其俱協于中而已羞進也羞行進德也雖有能有為而不能使進德則辦知捷給射御強力而不仁多材好勇而不義皆足為亂而邦何能昌正人長官也康誥惟厥正人正長以德選參佐以材選穀祿有家既富而又方賦祿不絶乃弗能使有好于而家朋淫傲虐之作是人必自陷于罪于其無好德汝雖錫之福彼豈能感恩知義亂臣賊子皆發于驕奢淫佚其作也汝必罹其咎矣商世家之患已作盤庚具乃貝玉先惡于民紂草竊姦宄脅權相滅皆世家也故箕子作汝用咎之戒為武王言之無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直會其有極歸其有極皇極仁義中正也五中一九三七二八四六皆偏一九南北對正雖偏而不黨三七東西對正視一九益偏而隨有黨二八以中德救一九之偏使不失正四六以中德救三七之偏使復歸於正由是一九三七二八四六皆協于中而後為仁之至義之盡水生木生者仁也生可使窮乎艮八居一三之間艮止也一生三而八止之乃反克焉火克金克者義也克可使窮乎坤二居九七之間坤順也九克七而二順之而遂生焉皆救其偏也皇極居中居中而不運化何所用之二八以中德分居東北西南一以節性一以率德而後一九雖偏而能不失正陂不正也此章偏陂好惡為一九也生好也而八制節之使無作好克惡也而二利道之使無作惡好惡正而黨不立義因事立義道合大體路取共由道有順有逆故自三至一皆生也惟八居一三之間反而為克生者順克者逆無逆則順不獨立此道體也然天地之大德生而已人之所共由也王天德也皇極必有主故稱王焉三四為木仁之勝也七六為金義之勝也木金二位相從是為勝勝則偏偏則黨由偏致黨故多忒猶易救也既黨復偏其事將變則愈難救矣是故無偏無黨王道蕩蕩蕩蕩廣大也不廣大而鄙狹是以為黨無黨則廣大也無黨無偏王道平平平平坦夷也不坦夷而欹險是以為偏無偏則坦夷矣四居已四月乾成卦純陽純隂六居亥十月坤成卦純隂純陽其偏甚矣皆為反側之勢四輕六重乾本君位而坤成卦乾剛坤柔勢釣體敵將變而爭故其事為重皇極居中居中而不能通變則奚所用之四六以中德而分居東南西北一以立道一以定位塞偏黨之源回反側之勢而後三七皆復歸於正此章偏黨反側為三七也然則一九以二分中德而不失正三七以四六中德而能復歸於正其患本生於偏成於黨至若黨而復偏則其事轉乖二八救之於未黨四六救之於既黨而又偏事之難易從可知矣故曰皇極仁義中正也又曰皇以君言極以理言即大中也會其有極歸其有極謂立義體道由路大履平守正皆本有之極合而歸之比德淫朋煢獨髙明之戒至此其義始盡曰皇極之敷言是彞是訓于帝其訓凡厥庶民極之敷言是訓是行以近天子之光曰斷文表見之也敷布也布列其言而道彰焉彞常也天人之理一也智愚之性均也于帝其訓言天之所以訓亦若斯而已也以近天子之光言無問微賤踈逺皆在天子光明之中也此専論庶民傅説曰惟天聰明惟聖時憲惟臣欽若惟民從乂曰天子作民父母以為天下王此皇極之大指也故又表見之赤子匍匐將入井非赤子之罪也故夫皇極不建斯民不能有其常性惡在其為民父母也王天下之所歸往也以善養人者然後能服天下天下不心服而王者未之有也六三德一曰正直二曰剛克三曰柔克平康正直強弗友剛克燮友柔克沈潛剛克髙明柔克惟辟作福惟辟作威惟辟玉食臣無有作福作威玉食臣之有作福作威玉食其害于而家凶于而國人用側頗僻民用僭忒正直中行也平平易康安和平易安和三代之所以直道而行也詩曰周道如砥其直如矢君子所履小人所視強至于弗可友是為剛剛過為當克燮和也和而友是為柔柔過為當克沈潛剛之克也髙明柔之克也剛能沈潛柔能髙明而皆協于正直繫辭曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義隂陽氣也剛柔質也仁義性也本同出也皆不能不偏偏則當克臯陶九德孔子六言六蔽皆克者也克則為善不克而過遂能為惡此天地萬物之理也坎正北一陽水也是為生物之始至巽四月六陽乾成卦而乾不居惡其亢也乾退居西北居坎之後以聽坎之所為是謂乾知大始離正南一隂火也是為成物之始至乾十月六隂坤成卦而坤不居不敢與乾並也坤退居離兊之間以宿火衛金而後物終成焉是謂坤作成物作言合金火之氣以造作之也是故乾居西北坤居西南乾坤正位然坤自西南挾其類順行為得朋進至亥六隂益得勢而乾位在焉於是隂疑於陽隂陽相薄而戰是為反側之勢乾舍其類而居西北茍自以為天下之至健首出順物不可得而匹也無乃猶為亢乎坤挾其類進而至於亥與乾遇茍自以為天下之至順勢足以得衆而物莫不吾從也無乃遂為朋乎故經皆以友立義以戒乾之獨立而坤之有衆也乾雖強弗可友而能克天道下濟而光明也坤雖和而友而能克地道卑而上行也上行承天也上行而不承天則為反側乾下濟坤上行同歸於正直則為合德此三德論乾坤剛柔之當克者如此也雖然剛柔固有正體也君法天而德剛其法尊臣位地而德柔其位卑乾剛坤柔德之正也貴賤有常正之體也臣之作福作威不法乎坤之順也臣之玉食不法乎坤之卑也君尊而不可匹敵故獨出臣卑而有衆故率以從上此剛柔正體截然而不可亂者也亂之必害于而家凶于而國士大夫用此隨勢而趨為側頗僻萬民亦用此不知尊無二上之義而僭愆差忒平康正直之德淪胥敗壤而害治矣故九疇之序曰乂用三德乂之言治也皇極三德皆論卿大夫之變其大意實相關三代世家至商風俗已壞驕淫矜夸弗克若德故盤庚曰豫迓續乃命于天多士曰豫惟降爾四國民命如其所為資富誅滅盤庚周公實正救之至春秋大夫卒擅諸侯之國作福作威玉食害家凶國悉如箕子所言陵夷至于戰國遂與其宗國相繼滅亡世變極于此矣是皆有天道焉箕子為能識其變武王周公為能通其變自洛書之道不傳變遂不可止夫子禮樂征伐庶人之論徒見於空言而已九疇皆序五行三德獨論剛柔之變何邪曰易有太極是生兩儀乾坤各有正位而合德於六故聖人於是極論剛柔之變以見兩儀體用四象八卦由是生焉繫辭曰天地絪緼萬物化醇其是之謂乎説卦曰乾以君之羣隂無陽將誰宗主之哉又曰坤以藏之有衆而不退藏其果何為哉自古天下治亂之原不出乎此矣七稽疑擇建立卜筮人乃命卜筮曰雨曰霽曰蒙曰驛曰克曰貞曰悔凡七卜五占用二衍忒立時人作卜筮三人占則從二人之言汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮汝則從龜從筮從卿士從庶民從是之謂大同身其康強子孫其逢吉汝則從龜從筮從卿士逆庶民逆吉卿士從龜從筮從汝則逆庶民逆吉庶民從龜從筮從汝則逆卿士逆吉汝則從龜從筮逆卿士逆庶民逆作內吉作外凶龜筮共違于人用靜吉用作凶擇其人而建立之乃命使卜筮不擇則妄惑難信也潤澤曰雨清明曰霽冥晦曰蒙踈散曰驛錯襲曰克皆龜兆變其名耳其實五行也內卦曰貞外卦曰悔天地雷風水火山澤亦五行也伏羲始畫八卦因而重之天地萬物之理無所不盡故占用其二衍則忒衍猶羡也忒差也卜五占二七之外則羡而差矣卜法至漢不傳怪誕雜出衍忒也立時人作卜筮吉凶皆決於其言必三人者太卜三兆玉兆瓦兆原兆三易連山歸藏周易故金縢三龜士喪禮占者三人不能皆同從二人之言從其多者也人心為難盡也異同畢至而聽命於鬼神所以一人心也是故疑亡而志恱大同順之至也豈惟其身之康強其子孫亦逢吉矣君臣民謀有從者而後以龜筮定之本人心也人謀不立而茫昧徼福是為瀆瀆則不告卜筮所以通鬼神也鬼神從之吾必其為吉鬼神違之吾必其為凶誠敬之盡也是故從多之吉有三有卿士逆庶民逆者矣有汝則逆庶民逆者矣有汝則逆卿士逆者矣若龜從筮從則皆不害其為吉又至於龜從筮逆則可以作內而不可以作外又至於龜筮共違雖君臣民無逆者亦不可以有作矣雖然吉與凶對猶有用靜之吉焉稽疑其數七位於兊與震對何也木柔金剛柔仁主養剛義主決天下不容有疑事也蓄疑則敗事矣博施濟衆夫豈非所欲哉疑何能行是故剛所以輔柔也義所以濟仁也雖然義豈徒剛也哉二者未嘗不相須也古者禮讓征伐遷都立君無不卜者繫辭曰聖人以通天下之志以定天下之業以斷天下之疑又曰聖人探賾索隱鈎深致逺以定天下之吉凶成天下之亹亹者莫大乎蓍龜八庶徴曰雨曰暘曰燠曰寒曰風曰時五者來備各以其敘庶草蕃廡一極備凶一極無凶雨以潤之暘以燥之燠以長之寒以凝之風以動之木東方主生雨潤澤生物易曰雲行雨施品物流形故雨為木之氣金西方金乾物成故暘為金之氣火南方燠火之氣水此方寒水之氣水生木仁取其生故一水三木火勝金義取其勝故九火七金水木本數火金互數隂陽逆順之變也風行八方應十二月故風為土之氣土位中夬故曰仁義中正曰時時若也言五者互備各以敘至則雨潤暘乾燠長寒凝風動物皆賴之庶草百穀草木也堯典鳥獸動物洪範庶草植物雨暘寒燠風於百榖草木其候最為可見五備為時若一備則恆若也一備則必一無皆凶也謂之極凶之窮也劉向五行傳以木配貌以火配言以土配視以金配聽以水配思非也晉天文志以木配貌以火配視以土配思以金配言以水配聽曰休徴曰肅時雨若曰乂時暘若曰哲時燠若曰謀時寒若曰聖時風若五事盡性也而雨暘燠寒風順之一氣流通也五事由一機發也庶徴由一念攝也觀休咎之來而察感召之因則固為念之要必知休咎未見一念差忒五事感亂而氣遂為之變矣是故聖敬日躋昭格遲遲上帝是祇一念之攝聖人何敢斯須忘之哉中庸曰惟天下至誠為能盡其性能盡其性則能盡人之性能盡人之性則能盡物之性能盡物之性則可以替天地之化育可以替天地之化育則可以與天地參矣九疇五事盡已也皇極盡人也庶徴盡贊化也一貫之理也曰咎徴曰狂恆雨若曰僭恆暘若曰豫恆燠若曰急恆寒若曰蒙恆風若狂妄易也僭差也豫遲緩也遲緩不謹則視猶不視也急迫蹙也無謀者多迫蹙詩曰折栁樊圃狂夫瞿瞿不能晨夜不夙則莫其何謀之有蒙昏塞也曰王省惟嵗卿士惟月師尹惟日嵗月日時無易百榖用成乂用明俊民用章家用平康日月嵗時既易百榖用不成乂用昏不明俊民用微家用不寧曰斷章更有義也庶徴之念聖人之所以盡已者固如是至稽參考驗則又當有義也省察也嵗會月要日計王所當察者一嵗之大會也徴之休咎嵗功之成不成王察其會而已卿士惟月師尹惟日皆有司之職非王之所當與也夫是以上下有體小大有序是為法天行政百榖用成平秩有政也庶草蕃廡包百榖其中此獨出百穀嵗功莫重焉百穀成則庶事皆舉矣乂用明庶績咸熙也俊民用章家用平康明有功也夫是為考績之法俊民隨小大登顯之卿大夫有家者各保其祿位和平而安康也反是則異效矣嵗月日時無易以大統小為序也日月嵗時既易上下相陵為無次也家用平康家用不寧此用著訓戒焉君不治大體而侵下親小事與臣不代有終而冒上居成功皆為失道庶民惟星星有好風星有好雨日月之行則有冬有夏月之從星則以風雨中星昏旦迭見為十二時王嵗卿月師尹日民則時也民用天之道因地之利謹身節用聽治於其上者也然而風雨性情寒暑常度因積時而見故别出箕好風畢好雨其貞好也日行南陸而日短至是為大冬行北陸而日長至是為大夏南陸井鬼北陸斗牛皆常度也日一嵗行天三百六十度月一度十二與日會而易朔日星之紀月實持其要也月一月一周天歷二十八宿從箕則風從畢則雨星有好惡月中其情也然則王總嵗功卿居月要而其積微至著則皆自夫民焉民情在所當順而常度不可不立是故風雨寒燠之為休咎兹又其所當稽參者也或曰自王省惟嵗已下當屬五紀脫簡在此乎曰非也五紀會嵗月日星以起厯數而立天道庶徴序嵗月日時以成嵗功而驗休祥事辭雖相涉而其用不同又九疇一二三四生數紀事六七八九成數備述治亂吉凶休咎禍福之變以見人之有能有不能是皆洛書微旨也四六二八皆土也四統於六皆天道也八統于二皆地道也坤順艮止皆土正性是故地勢為坤博厚平夷之象故萬物於是致養焉九疇二為五事使人得致其盡性之力也連山為艮髙峻巍阻之象故萬物於此成終焉九疇八為庶徴以驗人之所當有自盡者能盡致其力與不能能則為肅乂哲謀聖而為休徴不能則為狂僭豫急蒙而為咎徴原始要終古人格天之學也其要則皇極以五居中而虛十十布在四方一九三七水火金木之定位四六二八土德分布而有轉移變化之功焉九五福一曰夀二曰富三曰康寧四曰攸好德五曰考終命六極一曰凶短折二曰疾三曰憂四曰貧五曰惡六曰弱夀仁物之生也富義物之成也康寧禮物見相也攸好德智物堅貞也其德不爽壽考不忘昭明者也考終命信始終不變也曽子曰啓豫手啓豫足吾知免夫洪範本五行天地變化之物生死皆不能出此雖卜筮鬼神之所以告人者亦以此也凶畏壓溺皆是凶對考終命短折對夀疾憂合對康寧惡弱合對攸好德五福考終命居後六極短凶最居先何也信存於仁義禮智之終仁義禮智亡而為極信何所托哉祖伊曰非天夭民民中絶命故凶與短折為一類皆天命不佑者也天命不佑甚者凶其次短折有疾必憂蓋亦有不疾而其性自多憂者大扺憂則怫鬱其心不快是亦疾也惡很暴弱孱劣剛過而惡柔過而弱質亦有可移而不移故為極六極本四耳存仁義禮智之反而去信之亡以合於其類詩曰大無信也不知命也無言豈復足與言命哉疾憂貧亂其序一亂則皆亂罔之生也其猶有序乎五行傳以攸好德配貌康寧配言夀配視富配聽皆非獨考終命配思為是然思不配土而配水猶非也六極尤乖錯五事而六極於是别出星之不極咎加眊罰加恆隂而以弱配之是為不經其失易攻也福極天所命也而有人事焉是故因其所嚮而使趨之因其所畏而使避之人事修而天道順矣然不可必也回夭牛疾憲貧非人之所能知也聖人惟能使人知所嚮知所避而已矣故孟子曰桎梏死者非正命也知命者不立乎巖牆之下又曰夭夀不二修身以俟之所以立命也窮理盡性以至於命六極何以名極極凶之窮也皇極理義之盡六極凶之窮也故六極亦名之曰極福極之位於九何也天人之理盡於是也五行視明作哲配禮思睿作聖配信周公六德智仁聖義中和其序與五行同動容周旋中禮者盛德之至也是故推聖於南而中和居中中和禮樂也明聖互相用也孟子智聖始終條理其意同始智而終聖窮聖盡性以至於命非聖人何能至此是故一九一疇之始終也武王既勝殷邦諸侯班宗彞作分器西旅獻獒太保作旅獒旅陳也傳曰庭實旅百西戎之國因定旅獻獒非常貢蕃國各以其所貴寶為贄太保召公行諫職也旅獒惟克商遂通道于九夷八蠻西旅砥貢厥獒太保乃作旅獒用訓于王東夷南蠻職方氏四夷八蠻七閩九貉五戎六狄爾雅九夷八蠻六戎五狄克商通道不舉戎狄者自唐虞都冀王畿千里之外常山以北皆為狄土西戎即敘近在雍界惟夷蠻為逺周較雍益逺矣此舉逺者見致之為難也砥致致貢見當却而遂致之故太保作書訓王曰嗚呼明王慎德四夷咸賔無有逺邇畢獻方物惟服食器用克商通道志得矣而一獒之獻足以致玩足以起狎侮足以役耳目而失百度足以墮細行而纍大德然則慎德誠難矣是故堯舜禹湯文武未嘗一日無典學之功畢獻方物非服食器用不獻所以示好惡王乃昭德之致于異姓之邦無替厥服分寶玉于伯叔之國時庸展親人不易物惟德其物王乃以逺方貢物賜異姓諸侯昭德所致不替常職又分賜寶玉于同姓伯叔諸侯是用展親親之恩焉同姓諸侯亦有常職矣天下一姓榮懷同之率職奉貢不待言也故以親親為重左傳肅慎氏之矢賜陳夏后氏之璜賜魯其事也昭德展親在夫人耳而何以物為分賜豈以人易物哉蓋以為四方畢獻誠有輔佐之功不敢獨饗也然其賜物必皆足以昭德而後可非度玩侮安敢用之德盛不狎侮狎侮君子罔以盡人心狎侮小人罔以盡其力貢賜皆有常典獒不可畜而又不可以賜畜為玩物賜為玩人皆狎侮也狎侮君子雖不敢怒而心不樂小人出力以事人者也而狎侮之方招致不遜而豈能得其力哉不役耳目百度惟貞玩人喪德玩物喪志志以道寧言以道接不為耳目所役則百度皆正舜觀古人之象五色作服六律五聲八音在治匆出納五言所以防耳目之欲而正法度也玩不可啓玩人甚矣故喪德玩物雖細而亦能喪志志以道寧則非僻無自入言以道接則佞邪無自至不作無益害有益功乃成不貴異物賤用物民乃足作無益必害有益貴異物必賤用物用物榖粟絲麻不能充其欲淫靡煽之競相追逐夫豈能足哉犬馬非其土性不畜珍禽竒獸不育于國犬馬非其土性畜之不獨違物性且未必適用晉乘鄭駟慶鄭曰古者大事必乘其産不寶逺物則逺人格所寶惟賢則邇人安通逺人而貴逺物彼方窺見間隙量度中國而豈能格之漢求天馬征伐連年中國被其禍豈特不能格哉用賢人則邇者恱逺者來矣嗚呼夙夜罔或不勤不矜細行終纍大德為山九仞功虧一簣允迪兹生民保厥居惟乃世王無怠無荒勤也勿以細行而不矜終能纍大德為山九仞而虧一簣猶不成山召公愛惜武王功業獒獻微見間隙於是推其類廣言之允迪兹言信能蹈此則為克終四海乂安詒謀燕翼世世王天下矣巢伯來朝芮伯作旅巢命巢即南巢芮今同州馮翊縣古芮國春秋芮伯萬遷今陜州芮成縣庭旅始有巢貢而其爵命亦始行故曰旅巢命亡武王有疾周公作金縢周官占人凡卜筮既事則繫幣以比其命嵗終則計其占之中否鄭康成曰既卜筮史必書其命龜之事及兆於策繫其禮神之幣而藏焉書曰王與大夫盡辨開金縢之書乃得周公所自以為功代武王之説是命龜書案金縢册祝三王非命龜也命龜宜自有辭縢緘也藏之於匱緘之以金即籥也此書惟册祝之辭是周公作史因敘載前從事以為書名之曰金縢序稱周公作金縢者謂册祝之辭也金縢既克商二年王有疾弗豫二公曰我其為王穆卜周公曰未可以戚我先王二公太師太公太保召公穆敬戚憂也二公欲卜王休咎周公以為未可以憂我先王卜之不吉則先王憂矣記曰事亡如事存周召皆邑名在今鳯翔天興縣公乃自以為功為三壇同墠為壇于南方北面周公立焉植璧秉圭乃告太王王季文王功事孔氏曰周公自以請命為己事因三王請於天是也繼志述事武王周公同此心也周道未成而武王有危疾周公不得不自以為功也植置壁禮神置於三王之坐秉執史乃册祝曰惟爾元孫某遘厲虐疾若爾三王是有丕子之責于天以旦代某之身豫仁若考能多材多藝能事鬼神乃元孫不若旦多材多藝不能事鬼神乃命于帝庭敷佑四方用能定爾子孫于下地四方之民罔不祗畏嗚呼無墜天之降寶命我先王亦永有依歸今我即命于元龜爾之許我我其以璧與圭歸俟爾命爾不許我我乃屏璧與圭史以册書祝辭奉而讀之故謂之史乃册祝此辭周公自作元孫武王某武王名祝辭本稱名周人以諱事神作書時武王已沒故諱其名稱某遘遇厲危丕大大子之責言天將取其長大之子則以旦代若順豫仁順父能多材多藝能事鬼神乃元孫雖仁順父而不能多材多藝不能事鬼神此皆紀實之言王業未定可無周公不可無武王此當時輕重之勢也惟爾三王命于帝庭使敷佑四方定爾子孫于下地則四方之民無不敬畏武王既喪商人遂畔無所敬畏也天嘗降寶命我有周受之苟勿墜落武王康寧則我先王亦長有歸矣其許不許不可知也故就命于龜歸俟爾命謂許代而武王瘳神嚮其禮璧當埋之如祭祀之禮周公死圭遂以斂不許則屏璧與圭神弗答為當仁也爾不許我不敢取必於鬼神也乃卜三龜一習吉啓籥見書乃并是吉習因也三龜一習相因而吉又啓籥見占書乃并是吉必以書證之懼其億也言啓籥見書則凡占書皆緘藏之不敢褻也公曰體王其罔害豫小子新命于三王惟永終是圖兹攸俟能念豫一人占人君占體大夫占色史占墨卜人占坼體兆象也周公言觀龜兆象王為罔害豫新承命于三王惟長終是圖則周公亦不死矣豫一人豫天子也此所當待其能念于天子武王言疾當瘳也周公本請代武王武王瘳而周公不死龜固亦有所詔告魯文公十八年齊侯疾卜楚丘曰齊侯不及期君亦不聞令龜有咎占人占皆如是公歸乃納册于金縢之匱中王翼日乃瘳此册固當與繫幣同藏王翼日瘳昭答如響精神之格自作元命非聖人孰能之哉武王既喪管叔及其羣弟乃流言于國曰公將不利于孺子周公乃告二公曰我之弗辟我無以告我先王書傳皆言成王七嵗即位故皇甫謐曰武王克商後六年崩是為克商二年武王有疾成王始三嵗又四年武王崩成王七嵗矣成王能信管叔之言疑周公七嵗恐未能然又周公東征二年罪人斯得周公遺成王詩成王得金縢之䇿遂迎周公亦始九嵗耳恐亦未必能然茍子曰成王冠成人周公歸反藉焉周公攝政七年成王始冠則即位時十四嵗矣孔氏傳成王二十嵗成人周公歸政是也管叔周公兄羣弟蔡叔霍叔霍叔名處管今鄭州管城縣屬豫蔡今蔡州上蔡縣屬荆霍今晉州霍邑縣屬冀皆殷畿地伊尹曰豫弗狎于弗順周公曰我之弗辟則無以告我先王皆以身體國者也雖君疑於上國人惑於下而王業安危間不容髮一身之計豈足易其重哉是故行吾忠而已辟法也致辟管叔是也史記周公告二公我之所以弗避而攝行政非或又謂周公聞流言避遁居東二年成王既悟而後伐三監尤非大誥黜殷救焚之勢而暇遷延為身謀乎周公與國同存亡盡心力為之所謂握蛇騎虎不知其難者詩曰上帝臨汝無二爾心若有一毫顧忌之意則為二猶不足以動人而况能格天乎論聖人行事而以後世利害雜之則言何由當無以告我先王太王王季文王森然常在其上也鬼神知周公之心矣周公居東二年則罪人斯得流言方作周公何以遽東伐曰兄弟至親各據形勝外連新亡之國控引蠻夷其勢甚張其事甚急周公不得不連出成王雖疑付之二公安集西國召伯行其職故周公可以速出無內顧之憂周公何以必自將分陜周公主東方周公固當自將也大誥周公為將行東伯之職也江漢召穆公為將行西伯之職也古人為國事皆豫立周官司馬無一事不先具雖兵行倉卒有司各以其職行而已罪人斯得黜殷殺管囚蔡伐奄也周師既出人心遂定無侵蝕蔓延之勢其跋扈者獨此四國耳破斧曰周公東征四國是皇不數霍霍迎降多士昔朕來自奄蓋嘗伐奄也雖然二年而後得之則亦為甚難矣于後公乃為詩以貽王名之曰鴟梟王亦未敢誚公于後罪人既得之後也管蔡武庚已誅周公當歸周而成王之疑未解周公為不能已矣殷命雖黜而周道未成周公方將有為於其國而君臣之情不通則安可以行吾志此鴟梟之所為作也誚讓也幾欲誚矣疑其小哉管蔡謂周公將不利於孺子非假托此語也凡人之見只如此管蔡方為此言以為愛主成王亦方信斯言以為愛已而周公遽誅之則豈能不深疑不特鴟梟之詩破斧伐柯譏刺繼作而猶未悟周公亦窮矣睽孤極而羣疑亡非天相周何以有此史記作未敢訓公與弗辟而攝行政皆後世改就其意秋大熟未穫天大雷電以風禾盡偃大木斯拔邦人大恐王與大夫盡辨以啓金縢之書乃得周公所自以為功代武王之説啓金縢之書將以卜天變而得周公所藏䇿二公及王乃問諸史與百執事對曰信噫公命我勿敢言二公知周公為武王禱而不知其為請代能隂相成王不誚周公而終不敢使成王迎周公君疑如此不待其自悟而欲以口舌爭事轉乖矣周公之忠終當有以感動成王者雷風之變固非意料之所及也史與百執受周公之命至此猶弗言古人忠信為可見王執書以泣曰其勿穆卜昔公勤勞王家惟豫沖人弗及知今天動威以彰周公之德惟朕小子其新逆我國家禮亦宜之成王得書而知天意所在故不復卜而遂迎周公執書以泣不惟悟且保不變小毖曰豫其懲而毖後患莫豫荓蜂自求辛螫肇允彼桃蟲拚飛維鳥未堪家多難豫又集于蓼是何懲創之若是哉太甲曰既往背師保之訓成王曰惟豫沖人弗及知皆疑亡意悟一悟而不復變之言也然則周公身安而後國家可保猶不足言至所謂一正君而國定豈常人之所能致哉新逆舍舊之謂也東征凱還衮衣繡裳以復其位於我國家禮亦宜之方疑而東征必迎而後還國誠有安危之機焉非周公之忠其殆難居乎精誠之積天為之動故嘗謂舜之焚廪浚井文王之拘羑里周公之居東不獨免難而皆能成其志惟臣子之道自盡焉耳夫事不於跋胡疐尾觀之固不足以見聖人至其所以得遂其意豈有他道哉是故無墜天之降寶命我先王亦永有依歸與我之弗辟則無以告我先王同一心也武王翼日乃瘳與風雷之變同一誠也王出郊天乃雨反風禾則盡起二公命邦人凡大木所偃盡起而築之嵗則大熟風反禾起固為鮮見而大木所偃起而築之則嵗亦熟其事更稀有唐叔得禾異畝同穎亦適在此時周公之歸誠有天意自秋天熟以下當在微子代殷後置此者終周公請代事且志其所以感化成王者尚書説卷四

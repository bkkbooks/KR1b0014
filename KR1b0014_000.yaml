body:
  text: 尚書説書類提要臣等謹案尚書説七卷宋黃度撰度字文叔新昌人登紹興進士為御史劾韓侘胄寧宗時纍官禮部尚書龍圖閣學士卒諡宣獻度篤學窮經老而不倦于易詩周禮俱有撰述是編其尤著者也陳振孫稱度晚年制閫江淮著述不輟時得新意往往晨夜叩書孰為友朋道之可見其學之勤矣平日與朱子葉適陳傅良等相善周禮詩説皆為適所稱許是編雖但因孔傳而發明之然指論三代興衰治亂之迹與推明執中建極等旨皆深得理要非徒治章句之學者也乾隆四十五年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:425b75082ca4c9c3c1e0bffdc87fcc0b5ec4aec9267a40ab64da7ea7ebd3732e

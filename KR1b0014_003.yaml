body:
  text: 尚書說卷三宋黃度撰商書伊尹相湯伐桀升自陑遂與桀戰于鳴條之野作湯誓伊尹白豫弗克俾厥后為堯舜其心愧恥若撻于市一天不獲則曰時豫之辜其自任以天下之重如此故湯誓師之書而夫子序之曰伊尹相湯伐桀言其事出于伊尹也前末有此事誓辭乃出師之日誓于國中而序述鳴條之戰終伐夏也今解州安邑縣東北十五里有鳴條陌陑在縣北二十里湯自陑升與桀戰孔氏曰出桀不意非路當出此耳升陑與記武王渡孟津同鳴條與牧野同皆臨其國都於是戰矣史官與夫子序書皆詳之事之變也湯十一征皆為行方伯之職桀不諒其忠而方忌惡之昏虐愈甚湯於是誓師而出征葛之後湯誓未出師之前桀能改德事為可已也曰果可已乎曰何以不可文言曰上下無常非為邪也進退無恆非離羣也此聖人之事常人安能與此可上而不可下可進而不可退秦漢以來盜賊僭篡之所為人遂比之騎虎此豈足以論聖人哉湯誓王曰格爾衆庶悉聽朕言非台小子敢行稱亂王誓衆正大義也夫是之謂天討格至稱舉君臣有定分而至於放伐世固或以為亂也堯舜之禪湯武之伐皆權道也德必若舜禹而又有堯舜薦之者乃可為禪讓孔子不有天下繼世而有天下繼世而有天下亦必若桀紂而又有如湯武者乃可以言放伐是故非聖人而論權則亂而已矣有夏多罪天命殛之今爾有衆汝曰我后不恤我衆舍我穡事而割正夏豫惟聞汝衆言夏氏有罪豫畏上帝不敢不正穡事輕正夏重以農斂穫時出師桀之罪一日不可容於天下矣衆言奚敢不恤上帝為可畏也今汝其曰夏罪其如台夏王率遏衆力率割夏邑有衆率怠弗協曰時日曷喪豫及汝皆亡夏德若兹今朕必往今汝其必謂夏罪其如我所云者猶曰固知其然也率猶一切也言一切遏絶衆力不得用於養生喪死之事而又一切割剝之使獨豐夏衆知大命近止亦一切怠惰人各有心不相和合所謂農夫釋耒工女下機靡衣偷食以待滅亡也時是曷何是曰喪矣特不知其事狀如何耳豫及汝不能相救皆亡而已民非后罔事后非民罔使而夏德若此豈復可以君斯民哉必往言遂伐之也爾尚輔豫一人致天之罰豫其大賚汝爾無不信朕不食言爾不從誓言豫則孥戮汝罔有攸赦天命殛之豫畏上帝致天之罰惟有天德者能知之大賚功大者錫爵封國賚大封于廟湯既勝夏欲遷其社不可作夏社疑至臣扈古說湯革命創制變置社稷而後世無及句龍者故不可非也夏社大社王社也天子之社也將遷去之而義不可夏社疑至臣扈三書宜有議論至周黜殷而猶存亳社用湯故事三書皆亡夏師敗績湯遂從之遂伐三朡俘厥寶玉誼伯仲伯作典寶桀載其寶玉保于三朡湯伐之桀奔南巢遂俘其寶玉三朡今廣濟軍定陶縣東北有三朡亭古國也典主也誼伯仲伯二臣作典寶述興亡之戒云湯歸自夏至于大坰仲虺作誥大坰地闕仲虺名或仲氏奚仲之後為湯左相孔氏曰以諸侯相天子仲虺之誥成湯放桀于南巢惟有慙德曰豫恐來世以台為口實湯武應天順人然君臣之名終不可廢是故謂之放謂之殺而不敢辭舜遷苖謂之放流宥之也封象亦或謂之放不及以政也南巢今無為軍巢縣放殺不幸而有此也堯舜禪讓猶有子噲之事况放殺乎其為口實何疑是豈能無慙君子言而世為天下法行而世為天下則今舉動如此若稍有可議使天下後世不肖無恥有所並緣以行其姦則安能不憂易坤上六龍戰于野其血𤣥黃湯武戰矣必傷𤣥黃天地之色言上下皆傷也其至于此誠不幸矣仲虺乃作誥曰鳴呼惟天生民有欲無主乃亂惟天生聰明時乂有夏昏德民墜塗炭天乃錫王勇智表正萬邦纘禹舊服兹率厥典奉若天命民皆有欲無主則各求遂而亂矣聰明君德也人無欲則志定氣清而耳目聰明桀聰明非必不若人也縱欲而昏昏故不能聼德視逺豈惟不能乂民反塗炭之人主天下之表也表正則影從君不作德而縱欲以競其民豈得不亂湯勇足以斷天下之大事智足以察天下之大變天所錫也禹弼成五服使萬邦惟正之供皆有典常與天命流行天使湯表正萬邦纘禹舊服湯禹是率其舊典以奉順天命是則桀為弗克若天矣夏王有罪矯誣上天以布命于下帝用不臧式商受命用爽厥師凡其出令為割剝之事皆為矯誣天未嘗使人君厲民以獨豐也式用也桀為昏政天不善之故用商受命以爽明其衆記曰大學之道在明明德在新民簡賢附勢實繁有徒肇我邦于有夏若苖之有莠若粟之有秕小大戰戰罔不懼于非辜簡忽也簡忽賢德附托勢力韋顧昆吾之屬助桀為虐商始不見容於夏矣莠在苗必芟鋤秕在粟必簸揚而邪之醜正乃亦如是有德則興無德則亡不可得而私故謂之天位堯舜授受湯武放伐本一道耳豈嘗有私意哉桀惟失德而後天命改授乃不自省畏而欲剗商去之是尚可與言堯舜薦賢之事乎湯之誥萬邦曰爾有善朕弗敢蔽罪當朕躬弗敢自赦惟簡在上帝之心故夫子誦其言桀既私留大位而同惡助之將賊害賢德故小大之民無不戰戰懼陷非辜桀暴亂天下天下所恃者湯而已湯亡誰拯其亂哉此商師之所以遂出也史記自孔甲以來諸侯多畔夏桀不務德而湯傷百姓弗堪乃召湯而囚之夏臺已而釋之桀放而死謂人曰吾悔不殺湯使至此矧豫之德言足聽聞惟王不邇聲色不殖貨利德懋懋官功懋懋賞用人惟已改過不吝克寬克仁彰信兆民夫豈嘗以天下為私哉湯執中立賢無方其程度皆自已出改過不吝湯武反之也十一征無敵於天下天下信之惟其無私而已乃葛伯仇餉初征自葛東征西夷怨南征北狄怨曰奚獨後豫攸徂之民室家相慶曰徯豫后后來其蘇民之戴商厥惟舊哉是可以君天下矣佑賢輔德顯忠遂良兼弱攻昧取亂侮亡推亡固存邦乃其昌上無明天子方伯為政諸侯之賢者佑之有德者輔之忠者顯之良者遂之弱者兼之使有所附屬昧者攻之亂者取之亡者侮之改其社稷羣祀降其宗親皆侮道也凡此大要不過因其亡而推之因其存而固之所謂因其材而篤焉湯代行天職如此商邦之所由以昌盛也十一征規模可見矣德日新萬邦惟懷志自滿九族乃離此存亡得喪之機也王懋昭大德建中于民以義制事以禮制心垂裕後昆湯既伐夏實任君師之職仲虺以其慙也故言昔之所已為又言今之所當為天下任重放伐雖蒙其慙不得已也己德不明欲民之協中難矣自昭明德民被皇極之福君子創業垂統為可繼也以義制事以禮制心使足以遺其子孫此皆今日之當務也此書皆言桀縱欲故昏不能乂民湯無欲故聰明民奉之以為主而終篇制事制心實為舉要之語大抵人主之欲為難制也益戒舜猶曰罔咈百姓以從己之欲漢武帝曰多欲不可以君國子民信哉豫聞曰能自得師者王謂人莫已若者亡好問則裕自用則小此專論伊尹湯之於伊尹學焉而後臣之故王桀自謂伊尹不若己而舍之故亡鳴乎慎厥終惟其始殖有禮覆昏暴欽崇天道永保天命有其始矣克終為難殖有禮覆昏暴此理為不可易也欽崇永保安敢廢諸蘇文忠謂仲虺誠忠矣而湯之慙口實之病仲虺終不敢謂無放殺之名雖其臣子不能蓋夫惟湯武未嘗求蓋也夫不蓋其名是以為仁義之盡使有其實而欲蓋之則私而已矣何以為湯武湯既黜夏命復歸于亳作湯誥夏命雖黜復歸于亳以待諸侯之至湯誥王歸自克夏至于亳誕告萬方正天子號令王曰嗟爾萬方有衆明聽豫一人誥惟皇上帝降衷于下民若有恆性克綏厥猷惟后衷古訓善性之有也天降衷于民使順有常性能安其道則有君焉故伊尹曰豫將以斯道覺斯民也非豫覺之而誰也夏王滅德作威以敷虐于爾萬方百姓爾萬方百姓罹其凶害弗忍荼毒並告無辜于上下神祇民弗能忍其心離矣天道福善禍淫降災于夏以彰厥罪肆台小子將天命明威不敢赦降災彰其罪猶不悛湯遂伐之敢用𤣥牡敢昭告于上天神后請罪有夏聿求元聖與之勠力以與爾有衆請命出師類祭行王事也聿述述古事也元大聖伊尹黃帝堯舜以來傳記所傳皆有聖師聖人義禮之㑹也告於天無愧辭謀於聖人而協桀之罪為當討矣上天孚佑下民罪人黜伏天命弗僭賁若草木兆民允殖天佑下民信矣桀於是退黜屏伏去夏歸商豈有差忒天下更新煥然賁飾如草木之華精神氣象為不同矣兆民信能生殖俾豫一人輯寧爾邦家兹朕未知獲戾于上下栗栗危懼若將隕于深淵天使豫輯寧爾君公卿大夫而未知所以自免于戾故懼孔子曰治天下者不敢失於小國之臣而况於公侯伯子男乎凡我造邦無從匪彞無即慆淫各守爾典以承天休於是為商諸侯故稱造邦彞常慆慢周官冢宰掌建邦之六典以佐王治邦國爾有善朕弗敢蔽罪當朕躬弗敢自赦惟簡在上帝之心伐夏天下之公義也此義未嘗廢誠使爾諸侯有如舜禹之盛德吾且薦之於天使吾不可以任天下之重釋位去之何敢遏天命哉然則堯舜湯武之道廣大公平禪讓征伐所遭不同皆未嘗以天下為私也其爾萬方有罪在豫一人豫一人有罪無以爾萬方湯既伐夏而其民猶不能遷善逺罪猶不可與入堯舜之道綏猷之言不其病諸嗚呼尚克時忱乃亦有終咎單作明居咎單臣名明居書亡成湯既沒太甲元年伊尹作伊訓肆命徂后史記湯崩太子太丁未立而卒於是立太丁之弟外丙外丙即位三年崩立外丙之弟仲壬仲壬即位四年崩伊尹立太丁之子太甲太甲湯適長孫一曰祖甲孟子外丙二年湯沒六年三易君外丙猶未終喪而沒歲月易相亂恐疑後世故序書稱太甲元年且以見遷桐即元年事伊訓肆命徂后三書繼作太甲不受教而遷之太甲序太甲既立不明與此相類伊訓惟元祀十有二月乙丑伊尹祠于先王奉嗣王祗見厥祖侯甸羣后咸在百官總己以聽冢宰商紀年曰祀十二月商正月商周改正朔以一號令而詩書紀月不改夏正天時不可易也嗣王踰年即位伊尹主祠事奉嗣王朝廟此古者冢宰攝政之禮也侯甸在千里之外來見新王周禮侯服嵗一見甸服二嵗一見夏商侯服為王畿甸服則周侯服伊尹乃明言烈祖之成德以訓于王曰嗚呼古有夏先后方懋厥德罔有天災山川鬼神亦莫不寧暨鳥獸魚鱉咸若于其子孫弗率皇天降災假手于我有命造攻自鳴條朕哉自亳造哉皆始也始攻桀自鳴條而出令則自克夏歸亳孟子天誅造攻自牧宮朕哉自亳趙岐曰牧宮桀宮惟我商王布昭聖武代虐以寬兆民允懷為人君止於仁今王嗣厥德罔不在初立愛惟親立敬惟長始于家邦終于四海本立而道生不立無本道何由生是故立愛於其親充之而無所不愛立敬於其長充之而無所不敬親親之殺尊賢之等始于家邦終于四海以此嗣湯德嗚呼先王肇修人紀從諫弗咈先民時若居上克明為下克忠與人不求備檢身若不及以至于有萬邦兹惟艱哉肇始也湯人紀之修自立愛立敬始從諫順先哲居上明為下忠待人恕治已嚴皆人紀也愛敬之充也中庸九經愛敬而已桀廢棄人紀湯始修之而遂以有天下大要惟克艱故能致此敷求哲人俾輔于爾後嗣制官刑警于有位曰敢有恆舞于宮酣歌于室時謂巫風敢有殉于貨色恆于遊畋時謂淫風敢有侮聖言逆忠直逺耆德比頑童時謂亂風惟兹三風十愆卿士有一于身家必喪邦君有一于身國必亡臣下不匡其刑墨具訓于蒙士官刑雖設茍無哲輔杲何益哉恆舞酣歌近于巫覡貨色遊畋淫蕩不反侮聖言則無所忌憚逆忠直則無所降屈逺耆德則廢典刑比頑童則所趨必下逆倫害理亂之道也人主至此益難救食其祿居其位而不憂其敗非人臣也故有不匡之刑故侍講劉貢父曰墨非刑名也臯陶刑昏墨賊殺墨貪也臣不匡君貪其祿位故坐以墨蓋死罪也孔氏曰蒙士例謂下士或曰蒙矇古字從省為蒙周官瞽矇掌弦歌諷誦召武公稱矇誦衛武公亦曰矇不失誦所謂工執藝事以諫者也湯作官刑具以訓瞽矇使歌誦之以警邦君卿士伊尹取其言以戒嗣王嗚呼嗣王祗厥身念哉聖謨洋洋嘉言孔彰能敬其身則必能念祖矣洋洋廣大惟上帝不常作善降之百祥作不善降之百殃爾惟德罔小萬邦惟慶爾惟不德罔大墜厥宗提要之言益明簡肆命徂后二篇亡太甲既立不明伊尹放諸桐三年復歸于亳思庸伊尹作太甲三篇太甲嗣仲壬而立不明居喪之禮伊尹營桐宮居之夫子序書謂之放孔氏曰不知朝政曰放然則古者君喪雖冡宰攝政猶當有所關白放居桐蓋使專典喪不復預他事也庸常思常道一曰庸用思用伊尹之訓不明而放之思庸而復之人無不知伊尹之心者故孟子曰有伊尹之志則可無伊尹之志則篡也古說桐湯墓劉向曰成湯無葬處伏滔北征記望亳蒙間成湯伊尹箕子冡墓皆為丘墟寰宇記伊尹冡在宋州楚丘縣箕子冡在宋城縣太甲上惟嗣王不惠于阿衡惠順也阿倚衡平或曰阿保思保也故亦曰保衡伊尹作書曰先王顧諟天之明命以承上下神祇社稷宗廟罔不祗肅天監厥德用集大命撫綏萬方惟尹躬克左右厥辟宅師肆嗣王丕承基緒惟尹躬先見于西邑夏自周有終相亦惟終其後嗣王罔克有終相亦罔終嗣王戒哉祇爾厥辟辟不辟忝厥祖諟古訓是審諦之意顧察而審諦之文王陟降在帝左右也於以承上下神祇社稷宗廟無不祇肅言一本諸敬而已親親尊尊愛敬充焉居喪失禮是謂無本百神爾主何以承之惟天監其德而後有以集大命為天下君宅居師衆尹身親相湯以有九有之師故今嗣王大承其基緒誠願如先夏之有終而其相亦惟終不願如其後嗣王之罔終而其相亦罔終君有終則相亦有終君罔終則相亦罔終是故君相一體安危休戚無不同之太甲之克終不終伊尹安敢不任之於其身哉夏在亳西故曰西邑夏自周忠信為周終始惟一非忠信能之乎文言曰忠信所以進德也嗣王知所戒則敬而已矣敬則盡君道為君而不盡君道則為辱乃祖成湯矣王惟庸罔念聞庸用王惟自用無念聞伊尹之訓伊尹乃言曰先王昧爽丕顯坐以待旦旁求俊彥啓迪後人無越厥命以自覆慎乃儉德惟懷永圖若虞機張往省括于度則釋欽厥止率乃祖攸行惟朕以懌萬世有辭此諫語也昧未爽明丕大顯亦明也未明而大顯之平旦清明之氣也顯存晦亡旁非一方啓迪開明而蹈行之旁求俊乂啓迪後人夫是以伊尹有托孤寄子之責越顛墜也墜厥宗忝厥祖越命自覆悚然危亡之戒人之縱欲為侈快意朝夕不為久長之謀也機弩牙括笴虞人張機必省與度凖乃釋不茍發也孔氏曰機有度以凖望古機猶有存者銅為之植度於其側大學在知止在止於至善能欽其所止則能率循成湯之所行也大扺伊訓太甲之書專務教敬而敬必本於愛也太甲自謂欲敗度縱敗禮是由儉德之闕故伊尹舉要諫之王未克變伊尹曰兹乃不義習與性成豫弗狎于弗順營于桐宮密邇先王其訓無俾世迷周公曰祖甲不義惟王舊為小人繼體而立而執喪不如禮不義莫甚焉此漢之所以廢昌邑也然霍光解璽之際昌邑猶能言古天子有爭臣七人不失其天下是則漢公卿安能無愧色伊尹諫太甲言語略盡而猶未克變是不可以口舌爭矣不義之習將與性俱成性無有不善習或移之狎習豫非敢習為不順有不得已者伐桀放太甲皆非順經營桐墓立宮使居之成湯遺德餘烈足以感動人清廟曰對越在天駿奔走在廟不顯不承無射於人斯密邇先王而訓之擇端良之士與王居便嬖近習一切屏絶不使溺於世俗迷而不反王徂桐宮居憂克終允德孔氏曰居憂位蓋專使典喪也允信孟子有諸己之謂信信則不變保克終矣太甲之放為居喪無禮而自伊訓而下諫辭未嘗及之惟教之立愛立敬以修人紀鑒于三風十愆之訓以敬慎其身推而顧察天命承事鬼神終先王大業莫不由此居喪失禮豈待指事哉至此猶未克變將恐其惡遂成乃始攻其不義之習名之曰不義夫其得已乎徂桐居憂實始自覺不但遷善且能信德登而進之允實光輝太甲遂為商之令主此伊尹格天事業太甲中惟三祀十有二月朔伊尹以冕服奉嗣王歸于亳三年喪畢冕服而見于廟是謂即政朝廟禮之常也自桐歸亳而見廟因復政厥辟事之變也居之不疑從容有常君臣之際無迹可尋非聖人孰能與於此作書曰民非后罔克胥匡以生后非民罔以辟四方皇天眷佑有商俾嗣王克終厥德實萬世無疆之休胥相匡正周官九兩繫萬民胥匡以生也君民匹敵之勢桀塗炭斯民湯由是伐桀太甲幾又失之故伊尹以為復政第一語傳曰祖有功而宗有德湯取天下誠有功矣使太甲無克承之德商之載祀何以能久秦漢以後傳祚久近之效皆可見太甲克終厥德是為商萬世無疆之休誠有天命焉王拜手稽首曰豫小子不明于德自砥不類欲敗度縱敗禮以速戾于厥躬天作孽猶可違自作孽不可逭既往背師保之訓弗克于厥初尚賴匡救之德圖惟厥終拜手首至手稽首首至地太甲之言怨艾昔非歸恩師保明白洞達如此可謂允德矣伊尹拜手稽首曰修厥身允德協于下惟明后先王子惠困窮民服厥命罔有不恱並其有邦厥鄰乃曰徯我后后來無罰修身固將以治國平天下也自家而之國自國而之天下無所不協斯之謂信人皆有此信故能協太甲曰不明于德伊尹曰惟明后自昭明德豈可已乎皆有邦也而鄰國之民望湯如此湯來則砥善無罪罰允德之協于下也王懋乃德視乃烈祖無時豫怠奉先思孝接下思恭視逺惟明聽德惟聰必將視乃厥祖敬而勿失始于家邦而已矣斯須豫怠何以為懋德思孝思恭無時而不在念也形見於奉先接下之際耳蔽於近而亡逺何明之有耽於非度而荒德何聰之有伊尹猶防太甲舊慝之作歟朕承王之休無斁王無斁則朕承王休亦無斁太甲下伊尹申誥于王言之悉矣於此重發明之曰嗚呼惟天無親克敬惟親民罔常懷懷于有仁鬼神無常享享于克誠敬仁誠所出同天位艱哉德惟治否德亂與治同道罔不興與亂同事罔不亡終始慎厥與惟明明后五帝異禮三王不同樂而其道一也流連荒亡不同事而同亂始也與治同道終也與亂同事得非緝熙光明之學有所闕歟明明言光明相繼也先王惟時懋敬厥德克配上帝今王嗣有令緒尚監兹哉懋敬自强不息也若升髙必自下若陟遐必自邇道有本末事有先後未有一蹴而能至者也無輕民事惟難無安厥位惟危慎終于始太甲於是始親政故有慎終于始之戒惟難惟危慎之至也始或廢之終何觀焉有言逆于汝心必求諸道有言遜于汝志必求諸非道逆心之言正使狂真妄發茍求諸道亦可容忍况嘉言乎遜志之言正使同心協謀猶當求諸非道或恐未能盡理况以邪佞投合乎嗚呼弗慮胡獲弗為胡成一人元良萬邦以貞元者善之長也君正莫不正君罔以辨言亂舊政臣罔以寵利居成功邦其永孚于休伊尹將告歸矣故終篇陳君臣之戒既曰辨言必有新竒可喜之論不必庸君甘心焉袁盎一語而絳侯禮貌遽衰辨言之易惑也霍光既立宣帝猶秉政權君臣之間卒有遺憾寵利之可戒也辨言亂政寵利居功主意惑而國體虧斷非美事商周盛際安有斯事伊尹推理勢所至故言之以為世戒伊尹作咸有一德一德天德也中庸曰純亦不已咸有一德伊尹既復政厥辟將告歸乃陳戒于德太甲方倚重師保而伊尹遽歸商王業已定太甲克終允德伊陟臣扈皆足輔王伊尹可以歸矣是為人臣常道曰嗚呼天難諶命靡常常厥德保厥位厥德靡常九有以亡諶信常不已也一不作德桀紂不難至也故為亂亡之道夏王弗克庸德慢神虐民皇天弗保監于萬方啓迪有命眷求一德俾作神主慢神必虐民旱麓曰惠于宗公神罔時怨神罔時恫刑于寡妻至于兄弟以御于家邦惟尹躬暨湯咸有一德克享天心受天明命以有九有之師爰革夏正暨及不以君及臣而以臣及君伊尹於湯誠有教迪之功伊尹言之不嫌以為天下後世法夏正寅商正丑非天私我有商惟天佑于一德非商求于下民惟民歸于一德天視自我民視天聽自我民聽德惟一動罔不吉德二三動罔不凶惟吉凶不僭在人惟天降災祥在德一則無所不順故動與吉偕二三則是非參錯其偶不與凶會幸而已今嗣王新服厥命惟新厥德終始惟一時乃日新兹其始矣固未見其所終也終始惟一是為日新任官惟賢才左右惟其人臣為上為德為下為民其難其慎惟和惟一左右師氏僕使宰膳趣馬之屬朝夕在王左右者也人主作德不作德左右關繫為多臣為上為德為下為民大意是上輔君下乂民而其語難協為臣不易故當慎同寅協恭和衷故能一德無常師主善為師善無常主協于克一德不可以小成也苟主於善則皆可師善非一端而已也有以協之皆足以成德孟子曰舜聞一善言見一善行沛然若決江河莫之能禦也又曰大舜有大焉樂取諸人以為善自耕稼陶漁以至為帝無非取諸人以為善者伊尹懼太甲之小成也故教之以取善之道如此太甲能信矣剛健篤實光輝日新其德可不知勉乎俾萬姓咸曰大哉王言又曰一哉王心克綏先王之祿永砥蒸民之生遍覆包涵則其言之大悠久無疆則其心之一有是言而無是心朝夕變遷安可保也先王聰明時乂民永其祿王言之大王心之一則為能綏安之使斯民同砥于善無終窮矣生與欲並生哉之生同嗚呼七世之廟可以觀德萬夫之長可以觀政后非民罔使民非后罔事無自廣以狹人匹夫匹婦不獲自盡民主罔與成厥功親盡而廟不祧可以觀德矣賈誼謂文帝曰使顧成之廟稱為太宗商祖契宗湯太甲廟不毁與湯為二祧如周文武歟鄭康成曰殷六廟非中宗髙宗廟亦不毁此禮由商而來長萬夫則部分廣可以觀政矣后不自立非民何使民不自治非后何事君民本相須也其至於乖睽渙散仁之賊義之殘也民非后罔克胥匡以生后非民罔以辟四方而既言之此又言之者人主不可以不常知此意也匹夫匹婦有不自盡亦何遽至於罔成厥功哉然失一人之心則天下之志趣乖魏武帝一接張松不滿而蜀之士大夫舉不為魏是故明君必恭儉禮下自廣狹人之纍當深戒也沃丁既葬伊尹于亳咎單遂訓伊尹事作沃丁沃丁太甲子皇覽曰伊尹冡在濟隂已氏平利鄉今楚丘縣漢已氏縣訓以伊尹行事沃丁亡伊陟相太戊亳有祥桑榖共生于朝伊陟贊于巫咸作咸乂四篇伊陟伊尹子太戊中宗沃丁弟太庚之孫祥妖怪孔氏曰桑榖二木合生七日大拱不恭之罰史記一暮大拱巫咸臣名周公曰在太戊時則有若伊陟臣扈格于上帝巫咸乂王家咸乂四篇亡太戊贊于伊陟作伊陟原命孔氏曰原臣名二篇亡仲丁遷于嚻作仲丁嚻史記作隞李顒云在陳留浚儀縣皇甫謐曰或云河南敖倉是案敖倉在今鄭州滎澤縣西仲丁亡河亶甲居相作河亶甲相今相州河亶甲亡祖乙圮于耿作祖乙祖乙河亶甲子史記河亶甲時殷復衰祖乙立殷復興巫賢任職又曰祖乙遷于邪耿今河中府龍門縣圮毁也耿毁遷邢蓋兩遷索隱邢音耿恐非盤庚五遷嚻相耿邢殷祖乙兩遷為是邢今邢州龍岡縣祖乙亡盤庚五遷將治亳殷民咨胥怨作盤庚三篇史記自仲丁至陽甲廢適而更立諸弟子弟子或爭相代立比九世亂於是諸侯莫朝陽甲崩弟盤庚立殷今河南偃師縣謂之亳殷從先王居猶晉絳楚郢也咨嗟相怨不欲遷盤庚上盤庚遷于殷民不適有居率籲衆戚出矢言曰我王來既爰宅于兹重我民無盡劉不能胥匡以生卜稽曰其如台民不趨令適新邑之居籲和戚憂久皆重遷若曰可與樂成難與慮始勿恤可也然古人終不肯違衆而獨舉以智力求濟率和恱衆憂必使盡知其為不可不遷而聽命焉矢直直寫己之情也或曰矢誓要質之於鬼神也我王祖乙爰于宅居兹謂邢也劉殺耿圯遷邢邢山國所謂適于山也耿為水所圯於是來宅于此今其事變患害已至重吾民無盡殺為其不能相正以生也我於龜以稽疑龜告如我謀先王有服恪謹天命兹猶不常寧不常厥邑于今五邦先王有所服行敬謹天命此猶不敢常寧不常厥邑至于今五邦矣况今吾命民不能胥匡以生而豈敢懷安乎五遷必皆有故遷都大事冝皆有天命然古人簡質不以遷為難故自契至湯八遷自仲丁至祖乙四遷民皆聽命無異論至盤庚之遷而怨咨作安土之意已不能如古矣今不承于古罔知天之斷命矧曰其克從先王之烈若顛木之有由蘖天其永我命于兹新邑紹復先王之大業砥綏四方今不能承于古而遷為人情縱肆法度委廢天且斷絶其命汝猶罔知而况敢謂克從先王之烈譬若顛木之有蘖庶幾其能興起乎今遷則天且延長我命于兹新邑可以紹復先王大業砥定四方也王國居中四方承之𤣥鳥曰邦畿千里維民所止肇域彼四海自王國猶不能立法使民相正而生四方豈有砥綏之功先王之業墜矣已上總論遷都大意盤庚斆于民由乃在位以常舊服正法度曰無或敢伏小人之攸針盤庚之遷其大家實憚之小人未必盡不樂也盤庚將教訓其民推原不適有居之故皆自在位者始故以常日舊制所服行者先王法度大意則曰無得隱伏小人針規其上之言詩曰民雖靡膴或哲或謀遷都之利衆人雖未能盡見亦豈無智識之士知之者大家不樂壅遏民情議論偏勝不可據依故使一宣達之遷都事實為可求矣此史官紀盤庚行事大要魏相白宣帝去尚書副封而霍氏逆謀始得上閒是亦為正法度也王命衆悉至于庭王若曰格汝衆豫告汝訓汝猷黜乃心無傲從康衆羣臣也汝當以道黜汝傲慢之心古我先王亦惟圖任舊人共政王播告之修不匿厥指王用丕欽罔有逸言民用丕變今汝聒聒起信險膚豫弗知乃所訟先王圖任舊人共政修播告之辭未嘗隱匿其指王必用大敬無過失之言故其民順令曠然大變聒聒多言之貌今汝聒聒起而信受邪險膚淺于弗知其所辨訟果為何事此豈先王所以圖任共政者哉言在位羣臣不能繼承其先人同力王室也孟子曰為政不難不得罪於巨室世家梗政此時已患之非豫自荒兹德惟汝含德不惕豫一人豫若觀火豫亦拙謀作乃逸非豫自荒念舊之德惟汝含蓄恩德無所畏惕豫一人號令誅賞之所自出也譬若火作而弗救乃坐觀之則自一爝至於炎炎無由息也是豈非豫拙謀作汝過失至此乎若網在綱有條而不紊若農服田力穡乃亦有秋舉網而條不亂言事必有其序也農夫利穡而有秋言事無有幸而致也盤庚興商規模自遷都始故以舉網言之遷則可以紹復大業一勞永逸不遷則委靡頽敗將不能為一日之安故以服田言之汝克黜乃心施實德于民至于㛰友丕乃敢大言汝有積德乃不畏戎毒于逺邇惰農自安不昏作勞不服田畝越其罔有黍稷汝能自黜傲慢從康之心則能施實德於民至於婚姻朋友皆蒙被之今則不然丕乃敢大言皆世閲也故自謂有積德戎大昏强虛言惑衆大毒逺邇邢山國田少使其人惰農自安不强作勞不服田畝遂至於罔有黍稷此為不能胥匡以生事實盤庚之遷其大端在此汝不和吉言于百姓惟汝自生毒乃敗禍姦宄以自災于厥身乃既先惡于民乃奉其恫汝悔身何及吉善汝不協和善言于百姓而使咨怨不適有居惟汝自生毒大家總于貨寶小民罔有黍稷乃至于禍敗姦宄自災于其身恫痛民之惡汝既先之而猶自奉持其可哀痛之事刑罰將至雖悔何及乃奉其恫吉其凶也相時憸民猶胥顧于針言其發有逸口矧豫制乃短長之命汝曷弗告朕而胥動以浮言恐沈于衆若火之燎于原不可嚮邇其猶可朴滅則惟爾衆自作弗靖非豫有咎相視憸小小民針誨之言猶相顧忌恐其發有逸不協義理矧豫制汝短長之命而無所忌憚茍有異同何不告朕反覆議論而相動以浮言詿誤衆人恐遂一沈溺之譬若燎原之火雖不可嚮邇而猶可撲滅豈以羣起之勢不復可奈何哉是將以刑法施之矣若其至此則惟爾衆自作弗靖豈豫之咎盤庚欲舉法以治不從令者而卒不用也如所云云夫豈不可以行法然而不教而殺忿嫉于頑堯舜三代之盛未嘗有此必訓告必教誨使理悟而心服所謂以善養人者每如此也遲任有言曰人惟求舊器非求舊惟新古我先王暨乃祖乃父胥及逸勤豫敢動用非罰世選爾勞豫不掩爾善兹豫大享于先王爾祖其從與享之作福作災豫亦不敢動用非德人求舊器求新各有其冝也豫先王與乃祖乃父相及逸勤豫豈敢不念其子孫而動用非罰乎世選勳勞而官爵之不敢掩爾善念舊之意如此也爾祖與享於先王廟延有善而作福有禍而作災照臨于上不可欺罔豫亦安敢一切姑息動用非德乎非罰非德皆謂施之而不當理也豫告汝于難若射之有志言易出而志不審何能中乎汝無侮老成人無弱孤有幼老成之人智慮及之當有知遷都之為利者非必舉一世之人為異也孤幼不能自立隨其長上為向背也如其不昏作勞不服田畝至於仰事俯肓不能無憾是為虐之各長于厥居勉出乃力聽豫一人之作猷公卿大夫各有封邑而為之長當率其民勉出力以聼命作猷言遷都有道於此作興之也無有逺邇用罪伐厥死用德彰厥善自陷於死而罰施之故曰伐厥死邦之臧惟汝衆邦之不臧惟豫一人有佚罰凡爾衆其惟致告自今至于後日各恭爾事齊乃位度乃口罰及爾身弗可悔致告致吾之意而告之也王曰商俗靡靡利口為賢然則商人口之不度所從久矣盤庚中盤庚作惟涉河以民遷乃話民之弗率誕告用亶其有衆作動也將動而遷乃話其民弗率之故大告之以信其有衆咸造勿褻在王庭盤庚乃登進厥民曰明聼朕言無荒失朕命造至升進使前大司冦大詢朝位三公及州長百姓北面嗚呼古我前后罔不惟民之承保后胥戚鮮以不浮于天時殷降大虐先王不懷厥攸作視民利用遷汝曷弗念我古后之聞承汝俾汝惟喜康共非汝有咎比于罰先王無不惟民之承而民亦保其君相與戚憂鮮以不浮于天時之故浮猶溢也天時溢出為災猶洪範極備為凶也殷降大虐水圮都邑先王不敢懷安其所興作視民利為當遷汝曷不念所聞古后之行事其所以承汝使汝惟喜樂安寧將與汝共之非汝有過咎比于五流之罰而遷汝也豫若籲懷兹新邑亦惟汝故以丕從厥志豫所為順和懷念此新邑豈非為汝故以大從吾為民之志乎今豫將試以汝遷安定厥邦汝不憂朕心之攸困乃咸大不宣乃心欽念以忱動豫一人爾惟自鞠自苦試言試其事也灼然已見其可為而曰試者為衆人之不能盡知也今人猶曰且試觀之遷則安定厥邦不遷則莫可為也汝不憂朕心之所用如此乃皆大不宣其心務自覆匿不能欽念以誠而動我此豈所謂保后胥戚者乎不順我而遷喜樂康安不得共之必且自窮自苦若乘舟汝弗濟臭厥載爾忱不屬惟胥以沈不其或稽自怒曷瘳譬諸乘舟而弗求濟必臭敗其所載物爾誠不相屬猶豫二三豈但臭厥載而已中流泛泛必相與沈溺矣不於此稽察而至於禍敗雖自怒何能瘳汝不謀長以思乃災汝誕勸憂今其有今罔後汝何生在上汝不謀度長久以思汝不遷之災是大勸憂之道必自砥於困窮茍安朝夕有今罔後汝謂此何生在上乎傲誕從康自作之咎生於下不生於上也河亶甲以前事不可考祖乙之遷以水其災已見故其民樂從盤庚之遷以其民不能胥匡以生其禍尚隱伏未能盡見大家又壅隔其間故其民憚從今豫命汝一無起穢以自臭一故不變起於穢必自臭恐人倚乃身迂乃心豫迓續乃命于天豫豈汝威用奉畜汝衆人且誤汝偏倚汝身迂曲汝心終必有災不服常業身偏倚矣不則德義心迂曲矣故豫今將迎續汝命于天豫非威脅汝用奉承汝畜養汝而已豫念我先神后之勞爾先豫丕克羞爾用懷爾然失于政陳于兹髙后丕乃崇降罪疾曰曷虐朕民神后髙后皆湯子念湯勞來爾先人使作德故豫亦大能進爾於善用綏懷爾則既然矣我若不遷政教不行陳腐于此則汝何能善湯必大積髙降罪疾於我而言曰何得虐毒我民汝萬民乃不生生暨豫一人猷同心先后丕降與汝罪疾曰曷不暨朕幼孫有比故有爽德自上其罰汝汝罔能迪生生充其類進善不已也易曰生生之謂易盤庚言我不能進爾於上湯且降罪疾於我汝萬民力不能以類茂長於善暨豫一人偕之大道而同心焉湯亦大降與汝罪疾曰何以不及我幼孫協比而致有差爽之德自上降罰於汝汝無能迪吉矣幼孫盤庚自謂古我先后既勞乃祖乃父汝共作我畜民汝有戕則在乃心我先后綏乃祖乃父乃祖乃父乃斷弃汝不救乃死先王勞來乃祖乃父故汝共作我畜民衣食溫飽長老慈幼是為畜民而汝不臧厥心乃有戕害之事雖包藏不露而鬼神知之我先王綏安乃祖乃父乃祖乃父懷我先王之德不平怒汝乃斷弃汝雖死不救兹豫有亂政同位具乃貝玉乃祖乃父丕乃告我髙后曰作丕刑于朕孫迪髙后丕乃崇降弗祥亂治位雖有髙下而皆與人主共治政故曰亂政同位治政有位在民上而不恤民具乃貝玉而已汝又信其䛘惑不順我遷故乃祖先父大告湯使作大刑於朕孫開導湯大積髙降弗祥前篇訓有位無此語士君子當自識此理也此篇訓萬民故及之或曰盤庚患其民不從令故假鬼神以懼之是乎曰否古人必畏天必敬鬼神必省察禍福是故國家誥命必發於宗廟而盟誓必臨之以鬼神人心敬戒凛乎神祇祖考常在其上也從世人心放肆慢言恣行雖鬼神福善禍淫其道不改而人方顛迷豈能識察故雖隕越殄滅而猶不悟大抵古人鬼神之訓皆非假說之言也推此必然耳嗚乎今豫告汝不易永敬大恤無胥絶逺汝分猷念以相從各設中于乃心事不可已故告之不易其憂為大故當永敬絶逺而不相親事何由濟各安其分而念于道必能降以相從中茍不設犯分違道必矣乃有不吉不迪顛越不恭暫遇姦宄我乃劓殄滅之無遺育無俾易種于兹新邑遷徙之際固當明法禁而况嘗有異論動搖或恐姦邪乘間而作必當周防也吉善迪蹈顛越隕墜不順理不恭怠傲今法惡逆不道不敬也暫遇人而劫奪之為姦於外為宄於內小者劓大者絶滅無遺育不使易種于新邑往哉生生今豫將試以汝遷永建乃家盤庚下盤庚既遷奠厥攸居乃正厥位綏爰有衆曰無戲怠懋建大命奠定定其邑居而正廟社朝市郊野之位其衆新至勞來安定之告戒之使無戲怠勉立大命於新邑今豫其敷心腹腎腸歷告爾百姓于朕志罔罪爾衆爾無共怒協比讒言豫一人遷事百姓容有不能盡知吾心者浮言胥動今悉無罪汝汝亦無復共怒協比讒言於我古我先王將多于前功適于山用降我凶德嘉績于朕邦今我民用蕩析離居罔有定極先王祖乙祖乙圯于耿以屢遷靡定將使功多于前人故適于山擇髙而居用降損我凶德使災害悉去降猶今言減少也自祖乙至陽甲六世矣夫亦為有美績焉觀辭意則以嚻相皆因水而遷者至耿則不因水盤庚之遷必有以也孟子曰仁政必自經界始經界不正井地不均榖祿不平經界正則分田制祿可坐而定也山居固逺水而險阻狹隘其初遺民猶少久而生齒日繁地不能容於是蕩析離居任地不以井邑丘甸而田法壞域民不以比閭族黨而比法壞斂財不以郊甸縣都而賦法壞治兵不以五兩卒旅而軍法壞是則山居而地不可井民不可比先王法制靡爛敗壞舉不可行所謂失于政陳于兹蓋不可一朝居也公卿大夫具乃貝玉而已自其婚友不昏作勞不服田畝驕墮易貧其害猶如此而况於小民乎惟墊溺之憂屢遷之擾民得休息久而安之遂不復顧念其他所以遷事一起而咨怨竝作居民乖異莫能合也盤庚反覆告教言語略盡而其意卒不宣露至此始自謂敷心腹腎腸歷告朕志則豈不以可使由之不可使知之者亦有所難言歟盤庚智足以謀勇足以斷仁足以行然亦不易矣盤庚又八世至武乙去亳徙河北即朝歌又三世至紂淫靡而亡其世家驕淫周公遷于洛歷三紀而後世變風移此商人風俗盛衰本末爾謂朕曷震動萬民以遷肆上帝將復我髙祖之德亂越我家遷奚能遽復湯之德哉不遷人情玩習法今垢弊弃本逐末浮僞淫奢誠不可為己大抵都邑歲久繁庶勢必至此盤庚之遷不因災變徒以其民不能胥匡以生而自謂罔知天之斷命其惠有甚於水者衆人之智不及此復湯之德規模自遷始朕及篤敬恭承民命用永地于新邑我所以與厚敬之臣恭承民命用長居此地于新邑肆豫沖人非廢厥謀弔由靈各非敢違卜用宏兹賁沖童退托童人當異同之論始作夫豈敢廢之弔至由用靈善其至者用善而已至言其為不可加也吾謀之既善卜之又協其敢違之乎宏賁皆大也審謀考卜用大此大業嗚呼邦伯師長百執事之人尚皆隱哉伯長也諸侯一國之長師官師有教帥之義𦙍征官師相規長其官之長事之是否隱之於心則自知也豫其懋簡相爾念敬我衆朕不肩好貨敢恭生生鞠人謀人之保居敘欽懋勉簡檢相助肩任鞠窮也勉擇參伍僚屬以助之人謂邦伯師長也必當念敬我衆好貨者非所任果敢恭敬滋長於善哀矜窮乏之人而能謀人之保居者序之於位尊敬之鴻雁曰爰及矜人哀此鰥寡又曰雖則劬勞其究安宅今我既羞告爾于朕志若否罔有弗欽無總于貨寶生生自庸式敷民德永肩一心今我既進汝告以朕志矣庶事方殷凡所施設不能皆善其順於理則承之否則相與反覆之無有弗敬當黜逺貪叨其能滋長於善自用有常而後用敷民德永任一心勿替引之總于貨寶言專利也貝玉貨寶之戒至此凡三遷都異論實起於此山藪財貨出焉民不盡力於常産機巧趨利有勢力者則常擅其權晉人謀去故絳諸大夫曰必居郇瑕氏之地沃饒而近盬韓獻子曰不可山澤林盬國之寶也國饒則民驕佚近寶公室乃貧夫近寶之貧民必有竊持其權者而利歸於下晉大夫所以樂往商諸臣所以重去冝皆以此也盤庚遷于寬平之地將制民常産正經界而均一之以興教化使日遷善逺罪而保天命焉茍惟士大夫趨利之俗猶在豈惟民無所觀法而壞法敗政必有自兹始故其丁寧切至如此堯舜禹皆居冀惟商居河南豫州之境地最平廣井法行焉髙宗夢得說使百工營求諸野得諸傅巖作說命三篇髙宗名武丁孔氏曰𫝊巖在虞虢之界通道所經有澗水壞道常使胥靡刑人築護此道說賢而𨼆代胥靡築之以供食工徒屬工官故刑書謂之司空書髙宗直使百工營求之於野蓋亦得之於夢也水經沙澗水出虞山東南經𫝊巖有穴名𫝊窟即說𨼆所俗名聖人澗寰宇記今陜州平陸縣東北說命上王宅憂亮隂三祀既免喪其惟弗言亮信隂默謂之信默誠未嘗言也羣臣咸諫于王曰嗚呼知之曰明哲明哲實作則天子惟君萬邦百官承式王言惟作命不言臣下罔攸禀令明哲故作則天子君萬邦故百官承式羣臣言王固明哲矣言則作命不言則臣下無所禀令髙宗舊學于甘盤明哲知道羣臣知之居喪不言禮也既免喪而猶不言百官有司無所禀承得非賢者之過乎故羣臣諫之王言使出為命內史掌書王命遂二之是也已行為令外史掌書外令是也王庸作書以誥曰以台正于四方台恐德弗類兹故弗言恭默思道夢帝賚豫良弼其代豫言自謂其德不可以正四方雖一言不敢出知樞機之不可不慎也恭默思道是之謂知本恭默存存諸念皆息是為思道精誠昭格帝夢形焉乃審厥象俾以形旁求于天下說築傅巖之野惟肖史記巖作險周官司險掌九州之圖以周知其山林川澤之阻而達其道路是則孔氏所謂澗水壞道築護之是也說無姓遂以傅巖姓之爰立作相王置諸其左右命之曰朝夕納誨以輔台德爰於是而立為相置諸左右命之納誨輔德師保之也古者冡宰猶是行有司之事相則師保也仲虺為左相伊尹為右相周召相成王為左右若金用汝作礪若濟巨川用汝作舟楫若嵗大旱用汝作霖雨啓乃心沃朕心若藥弗瞑眩厥疾弗瘳若跣弗視地厥足用傷天下國家之事蓋未數數然也髙宗可謂能自得師矣啓心沃心異心而同理也藥弗瞑眩而疾弗瘳忠言之難受也履以足不以目非目之視而足傷君臣相須之體也惟暨乃僚罔不同心以匡乃辟俾率先王迪我髙后以康兆民同官為僚暨及也使說表倡之嗚呼欽豫時命其惟有終必若欽豫是命其惟有終乎掘井九仞而不及泉猶無終也雖然維天之命於穆不已何時而終乎夫是以有斆學半之論說復于王曰惟木從繩則正后從諫則聖后克聖臣不命其承疇敢不祗若王之休命木之從繩雖曲必正后之從諫雖狂作聖學問之移人也舍己從人樂取諸人以為善聖人分量說命中惟說命總百官是為冡宰始臣之也乃進于王曰嗚呼明王奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以亂民王為元后公侯伯子男皆君也公爵最尊天子諸侯皆有大夫庶官有師有長皆舉綱而言惟天聰明惟聖時憲惟臣欽若惟民從乂惟口起羞惟甲胄起戎惟衣裳在笥惟干戈省厥躬王惟戒兹允兹克明乃罔不休天聰明聖法天臣欽順其君而民聽焉出其言善則千里之外應之不善則千里之外違之惟口起羞也甲胄所以衛身也人莫不自衛而後兵戎與焉衣裳在笥必自貴重勿輕出輕出則人亦賤薄之矣無瑕者可以戮人干戈之伐必自省也凡此王當戒之信此能明則無不姜者惟治亂在庶官官不及私昵惟其能爵罔及惡德惟其賢官無小大一官廢則一事不治遂害大體官私昵爵惡德咈天違理人心不服邪惡得志亂必及民慮善以動動惟厥時寡慮易也多慮葸也易多敗葸不及事不易不葸其惟治其心乎動惟厥時中其㑹也有其善喪厥善矜其能喪厥功善與人同舜所以為有君德也驕矜起於自私一己之善猶無以容之况能以天下為度乎惟事事乃其有備有備無患及其間暇般樂怠傲刑政不修患至而圖之何及哉無啓寵納侮無恥過作非小人難養啓寵即納侮諛佞欺蔽皆侮道也蓋藏而不用其情為恥過恥過即作非之端孔子曰君子之過如日月之食小人之過必文惟厥攸居政事惟醇政事醇疪一二而治之則弊弊然矣端本澄源惟其所居何如耳禹曰安汝止汲黯謂武帝曰陛下內多欲而外行仁義奈何欲效唐虞之治黷于祭祀時謂弗欽禮煩則亂事神則難簡與黷皆弗欽也說以冢宰論事無非其所當言者其間不無有司之事而亦必本於君德說枚數條列類皆髙宗所闕刮磨洗濯乃猶有不能盡除者易曰髙宗伐鬼方三年克之是為干戈省躬之戒祖己曰典祀無豐于昵是為黷于祭祀之戒說皆有所預見其言不虛發也扁鵲視病方其在皮膚而易治腠理深矣府藏何及此二事髙宗中之稍深故其證狀終一發見王曰㫖哉說乃言惟服乃不良于言豫罔聞于行夫豈不行而無聞焉憒憒而已說拜稽首曰非知之艱行之惟艱王忱不艱允協于先王成德惟說不言有厥咎知行難易何如曰皆難知謂透徹大知非小知也大知致知也知之至也智光融照動與理會兹豈易事哉雖生知亦必有用力處髙宗罔聞于行厥終罔顯之語誠有疑處未能全徹却是知有此事跣弗視地厥足用傷足與目相為用此喻極的當非識得此理何緣能出此語故其求傅說之助切切也大抵行與知本相須也孟子論智聖巧力只是知與行夷惠行得到而知未盡故有中非爾力之語余嘗謂求賜皆知之矣雖巧而力不能到百步之外箭至中道而墜巧果何施然則孟子論夷惠是知處缺傅說與髙宗言是行處缺行所能至知或及之行處無力所知亦能退落故傅說教髙宗力行以致髙明光大之功其實真智全力即是精一之學皆非易事說命下王曰來汝說台小子舊學于甘盤既乃遁于荒野入宅于河自河徂亳暨厥終罔顯周公曰在武丁時則有若甘盤髙宗本受道於甘盤也又曰髙宗舊勞于外爰暨小人孔氏曰小乙欲使髙宗知民之艱苦故使居民間此言遁于荒野為合遁于荒野固為欲知民事當亦為從甘盤而學也甘盤不仕來學往教之義古人嚴之入宅于河王都在河北時自河徂亳從盤庚遷亳也嵗月非不久及其終無所顯明自言其學未竟也爾惟訓于朕志若作酒醴爾惟麴糵若作和羮爾惟鹽梅爾交修豫罔豫弃豫惟克邁乃訓自其在心為志而訓之故謂之格心作如遐不作人之作猶麴蘖作酒醴鹽梅作和羹也交修言不一也隨事切磋之不使有微小遺失也邁行也說以力行要髙宗故髙宗有克邁之言焉說曰王人求多聞時惟建事學于古訓乃有獲事不師古以克永世匪說攸聞春秋天子之事稱王人本此天子稱王人不敢斥尊猶今稱陛下也王人求多聞實將措諸事業而不於古訓則安能有所獲事不師古創意立新而為之源流不接損益無章必無可繼之功髙宗三年不言恭默思道一意乎其內學聚問辨誠闕焉約而不博傅說恐其不足以建事故以多聞之求古訓之獲為論學之首亦教其所不足也然而髙宗為有本矣子貢曰文武之道在人賢者識其大者不賢者識其小者莫不有文武之道焉仲尼焉不學子曰賜也汝以豫為多學而識之者歟非也吾一以貫之夫無所不學而一以貫之所以崇德而廣業也惟學遜志務時敏厥修乃來允懷于兹道積于厥躬惟斆學半念終始典于學厥德修罔覺監于先王成憲其永無愆遜順也髙宗求訓志之助故𫝊說有遜志之言髙宗求道亦蹙矣徒思不學久之必殆故傅說學于古訓為第一語博其外也惟學遜志為第二語寬其內也遜志優游不迫也務時敏拳拳服膺不失也遜志務時敏即孟子勿忘勿助長也張范陽曰道不可以有心求不可以無心得厥修乃來與道相應自得之也允信允懷于兹信保不變無有間斷也造次必於是顛沛必于是而道積矣躐等陵節非積也斆教也教者學者至此各及其半而已記曰教然後知困學然後知不足遜志務時敏允懷于兹教者猶有所指授自此而往豈有法可傳哉故困學者用力至此亦常患不足故中道而廢髙宗謂雖受學於甘盤而未竟故傅說以斆學半為言蓋雖甘盤教亦止此而已然則一念終始典學之功在人自致焉耳典常也一念終始必常于學則厥德之修有不能自覺者純一正念更無它念此是多少學力道積矣而學不已於是乃入聖位始敏中懷終念皆其致力處也始來中積終罔覺皆為道之候也譬之植苖發秀穎栗皆有其候焉孟子曰流水之為物也不盈科不行君子之志於道也不成章不達此之謂也來積罔覺皆有梯級熟而後進故謂之章如篇章之章如章程之章非可以襲而至也狂狷簡率雖有可觀而不純粹不精微久久其病皆出厥修罔覺其學成矣將舉而措之事業而先王成憲無所覽觀則未免有過失大匠誨人必以規矩雖聰明如堯舜其治天下亦必稽古成法師曠不以六律不能成五聲離婁不以規矩不能成方貟孔子曰述而不作信而好古竊比於我老彭學到聖人地位方能如此後世學者喜作而不喜述輕妄反古非是無識見却是缺學問識見漂溢無規矩凖繩故其病如此髙宗識見髙𫝊說預見其形象故終始訓戒之始曰事不師古以克永世匪說攸聞終曰監于先王成憲其永無愆其致意深矣罔覺之修成憲之監髙宗之學有體有用髙宗自謂德不足以正四方乃至一言之不敢發既相傅說則汲汲於訓志之助是誠知所不足矣傅說數語本末兼舉隨闕而補之應病而藥之致君之學可謂盛矣雖然夫子有言發憤忘食樂以忘憂不知老之將至是則說之自致者猶未知其所終也其教髙宗奚敢不知困哉盡其辭語所及而使髙宗自致者終不可見教者學者誠半而已矣惟說式克欽承旁招俊乂列于庶位古人相業必有次序孟子曰人不足與適政不足與間惟大人為能格君心之非君仁莫不仁君義莫不義君正莫不正一正君而國定矣此之謂首務旁招俊乂列于庶位固宰相之職則又其次也王曰嗚呼說四海之內咸仰朕德時乃風股肱惟人良臣惟聖昔先正保衡作我先王乃曰豫弗克俾厥后惟堯舜其心愧恥若撻于市一夫不獲則曰時豫之辜佑我烈祖格于皇天爾尚明保豫罔俾阿衡專美有商惟后非賢不乂惟賢非后不食其爾克紹乃辟于先王永綏民此非一時之言史類次前後以成書髙宗之學大成矣是以四海之內咸仰其德而髙宗歸功於說以為教之力終斆學半之言也不曰教而曰風風有感發之義大雅曰吉甫作誦穆如清風股肱非其人則不可而必聖臣乃足以居此選惟伊傅足以當之惟湯髙宗為能知之湯格于皇天伊尹作之也學至於格天則至矣髙宗以此要傅說則終始典學之訓實能不畔於其師又治也大畜不家食吉養賢也說已為髙宗出紹辟綏民皆其所當自任者而後說不為虛出說拜稽首曰敢對揚天子之休命髙宗之言真可承堯舜禹湯之緒非其學之成奚能至是說對揚之以為可布於天下可傳於後世也說命上篇得說置之師保之任以求諫誨中篇為冡宰論事指擲髙宗闕失切磋之下篇論典學全功髙宗遂入聖域髙宗祭成湯有飛雉升鼎耳而雊祖己訓諸王作髙宗彤日髙宗之訓祖己臣名祭之明日又祭殷曰彤周曰繹以髙宗名篇史追稱初名必異稱其廟名者以其能不失德也史記祖己嘉武丁之以祥雉為德立其廟為髙宗初甘盤中傅說末祖己皆聖師髙宗自立之地誠髙矣髙宗彤日髙宗彤日越有雊雉祖己曰惟先格王正厥事應天變其事不一格王正事其先者也乃訓于王曰惟天監下民典厥義降年有永有不永非天夭民民中絶命天監視下民其義為有常民受天地之中以生所謂命也而降年或永或不永天未嘗夭之也民不作德故中絶其命天人相與之際誠難知也而其可知有常者如此耳民有不若德不聽罪天既孚命正厥德乃曰其如台順德則永不順德則不永今民乃有不順德而又不聼罪者然天必信其命不可欺也必正其德不可枉也其人猶不知警戒乃反曰其當如我何私其一已取必於天故以福為可徼而禍為可移是為不受命嗚呼王司敬民罔非天𦙍典祀無豐于昵王之所司敬民而已民為天𦙍𦙍嗣也天子天之元子也民其支庶也兹無非天嗣者使天子宗主之耳天之愛其子甚矣夀考安寧天實錫之人君誠能若天敬民皇建有極使五福均被則受祿于天而何用豐昵祀哉王者祭天地祭山川祭社稷宗廟無非為民者昵猶䙝也不用常典則為褻傅說曰黷祖己曰昵一義孔民曰近廟非夫子曰丘之禱久矣獲罪于天無所禱也秦漢祕祀之興豈為識君道哉豈足與言天命哉文帝除祕祝令祠官勿私幾於道矣其後忽以方士之言置渭上長門五帝之祠怪變驟作與其平日所為絶不相似幸其覺早聞賈誼鬼神之對始自以為不如誼而諸祠皆罷觀其遺詔則超然於生死之際矣漢秦以來人主不求神仙即興祕祀大抵畏死耳觀祖己非天夭民之語髙宗疑若亦為祈長年者夏帝孔甲好鬼神之事天降龍二三代以前常有此等事周官致天神致地祇致人鬼物魅秦漢寶雞神光皆是然則雊雉不足怪也髙宗固為能知鬼神之情狀者而獨未免以夭夀二其心則害道此祖己所為作訓也理性命一貫之學也說命三篇窮理盡性髙宗之學精矣至此始能通於命而其道備是故學無止法髙宗之訓亡殷始咎周周人乘黎祖伊恐奔告于受作西伯戡黎仲虺曰肇我邦于有夏若苖之有莠若粟之有秕小大戰戰罔不懼于非辜西伯戡黎序殷始咎周夏商之事皆然是必不能容也乘勝也黎今潞州黎城縣商畿內諸候祖伊臣名祖己後受帝乙子史記名辛天下謂之紂孔氏曰紂受音相亂諡法殘義損善曰紂武王稱商王受受紂果音亂則紂非諡矣薛士龍曰西伯武王說苑膠鬲稱武王為西伯紂使繼文王歟泰誓觀政乃乘黎也黎與紂同惡武王聲其罪而伐之以諫紂此所謂觀政戡亦勝也案文王獻洛以西之地於紂是則紂以前二伯地域自洛分至文王獻洛西地始自陜分其後周人因之黎在陜東非西伯所統治武王越陜入商畿內有所誅討蓋以動紂也故祖伊恐西伯戡黎西伯既戡黎祖伊恐奔告于王曰天子天既訖我殷命格人元龜罔敢知吉非先王不相我後人惟王淫戲用自絶訖絶格至孔氏曰至人以人事觀殷大龜以神靈著之皆無敢知其吉者紂罪多矣一語蔽之曰淫戲故天弃我不有康食不虞天性不迪率典紂自絶于天故天弃之而猶不悛或酬縱或暴怒未嘗一食能自安也不復虞度天性喜怒哀樂不能知其所由生毁廢典常無所蹈率今我民罔弗欲喪曰天曷不降威大命不摯今王其如台摯古訓至大命不至謂亡紂大命胡不至也玉亡其如我言史記湯誓夏罪其如台髙宗彤日乃曰其如台西伯戡黎今王其如台皆作其奈何夏衆率怠弗協而後湯伐桀殷民罔弗欲喪而後武王伐紂此之謂時王曰嗚呼我生不有命在天祖伊反曰嗚呼乃罪多參在上乃能責命于天殷之即喪指乃功不無戮于爾邦反覆參列即日喪亡指汝為功會當有誅戮於爾國中者紂敗赴火武王以黃鉞斬紂頭懸大白之旗紂罪浮于桀故祖伊以為當誅紂不畏罪自反而委命於天蓋至於此則不復可救矣故祖伊以為即喪之候而武王誓師亦援此言之武王乘黎祖伊諫紂是皆有望其能改也而紂方無忌憚如此於是殷之賢臣或去或默或死而殷遂亡世謂祖伊之言直紂雖不改終不怒猶賢於漢唐中主殊不知自古未嘗有殺諸賢者紂實啓其端秦漢以後人稍習見之紂作俑逆道悖德武王行天討遂指以為罪紂忍於祖伊而不忍於比干不勝其很至比干乃發耳世遂以祖伊偶不死為紂容德豈非過乎或曰乘黎而紂改過則何如曰是武王之心也須暇五年但自秦誓未出師以前紂若改過事輒不同聖人行事進退常有餘地也文武從來未嘗失臣節於紂聖人格天事業使武王能感悟紂紂改過君臣之際必當更有可觀羑里事亦可見方伊尹之放太甲事亦甚蹙矣太甲思庸伊尹奉而還亳太甲方歸功於師保雷風之變成王自以為弗及知由是委國一聽於周公大扺聖人之所為不可以常人論也然紂自乘黎後其惡愈甚泰誓之師既出安可復在君位哉或曰祖伊言於暴君而其直如此非保身之道曰非也滅亡將至直言猶恐不入何暇婉乎幸其見聼耳不聼祖伊死何辭焉殷既錯天命微子作誥父師少師錯亂微子紂兄名啓啓母賤不得嗣微國名孔子家語微或作魏讀從微父師箕子紂之諸父為太師箕亦國名少師比干微子數諫不聼將去故告二師紂錯天命而亡比干諫而死微子抱祭器歸周存商祀箕子為武王陳洪範卒不臣周皆所以正天命也微子微子若曰父師少師殷其弗或亂正四方我祖砥遂陳于上我用沈酗于酒用亂敗厥德于下順道而告之殷其弗或治正四方矣或之云者猶幸其能反也砥致也湯致其功業遂陳列於上我我紂也今紂乃用沈湎酗醟亂敗其德于下殷罔不小大好草竊姦宄卿士師師非度凡有辜罪乃罔恆獲小民方興相為敵讎殷人無小大皆好為草野竊盜內外姦宄貪縱成俗不奪不饜其卿士大夫相師為非度舍匿過致羣聚鬭略故遺失有罪不能常獲小民無所告訴方起而自相為敵讎是則禮義亷恥刑政禁防舉無可恃者必亡之證也秦漢隋唐其季世皆如此今殷其淪喪若涉大水其無津涯殷遂喪越至于今涉大水無津涯沒而已殷遂喪於今至矣曰父師少師我其發出狂吾家耄遜于荒今爾無指告豫顛隮若之何其又告之意轉切矣吾憂而狂不能自制家居耄亂欲遜遁荒野今爾無指意告戒我失道顛隮其如何哉微子有去意而未决與二公謀之父師若曰王子天毒降災荒殷邦方興沈酗于酒乃罔畏畏咈其耇長舊有位人今殷民乃攘竊神祇之犧牷牲用以容將食無災降監殷民用乂讎斂召敵讎不怠罪合于一多瘠罔詔箕子亦順道而告之紂錯天命箕子微子之相告語必順於道事變不同道常在也天慘毒下災殃荒亂殷邦方起而酗酒不畏其所可畏咈戾耉老長者舊有位之人殷民更甚無忌憚乃奪攘盜竊祭天地犧牲粢盛有司失職既不禁禦鬼神亦容其行食而無災咎蓋不復顧賴之矣下觀殷民所用治之者皆讎其民而斂怨鞭笞刑戮無所不用招召敵讎無有懈怠上下之罪合而為一多所朘削羸瘠無復有詔告其非者蓋至於此而其亡决矣色純曰犧體全曰牷牛羊豕曰牲器實曰用商今其有災我興受其敗商其淪喪我罔為臣僕商今其有災我起而諌之必受其敗商若喪亡我當為臣僕而猶恐無其所此言紂必死也紂存則為師保紂亡則為臣僕貴賤之異詔王子出迪我舊云刻子王子弗出我乃顛隮自靖人自獻于先王我不顧行遁詔我王子出亡以存商祀於王子義分為蹈道刻薄微子以母賤不得立則商之薄也孔氏曰箕子謂我久知子賢言於帝乙欲立子帝乙不肯其說恐有所傳為商王元子而賢宜存商者也儻留而與之俱亡則商祀必絶雖我亦顛隮矣各務安靖度義審分以自獻于先王行遁非吾之所得為也箕子師也師不當死亦不當去商亡欲為紂臣僕紂死不得行其義分也少師無一語自見自分以必死也周官師氏掌以媺詔王保氏掌諫王惡少師蓋如周保氏以諫為職也自分以必死何也以諫為職諫既不效君喪國亡而不死得乎紂雖不殺之則亦奉紂以死耳無一語詔微子何也尚冀其言之見聼幸而不至於亡也惟國未亡而去違難免身微子之事最為難處故與二公反覆之存商祀之契配天又七八百其獻於先王者如此故夫子皆以為仁仁者人也合而言之道也右商書三十五篇其十八篇亡尚書說卷三
